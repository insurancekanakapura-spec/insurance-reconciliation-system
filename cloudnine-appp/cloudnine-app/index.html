  const stageCols = { preAuth:'#6B4EE6', finalBill:'#FF6B9D', approval:'#FFB800', documentation:'#00D4AA' };
  const statusColors = { Settled:'#D1FAE5', 'Short Paid':'#FEE2E2', Dispatched:'#DBEAFE', Pending:'#FEF3C7' };
  const statusText   = { Settled:'#065F46', 'Short Paid':'#991B1B', Dispatched:'#1E40AF', Pending:'#92400E' };

  const filteredDisplay = caseSearch.trim()
    ? cases.filter(c =>
        c.id.toLowerCase().includes(caseSearch.toLowerCase()) ||
        c.patientName.toLowerCase().includes(caseSearch.toLowerCase()) ||
        (c.uhid||'').toLowerCase().includes(caseSearch.toLowerCase()) ||
        (c.mobile||'').includes(caseSearch)
      )
    : cases;

  // Scope label for corporate roles
  const getScopeLabel = () => {
    if (userRole !== 'corporate') return null;
    if (corporateRole === 'VALIDATION_TEAM') return { text: 'Stages 1–3 only (Pre-Auth, Final Bill, Approval)', color: '#1E40AF', bg: '#DBEAFE' };
    if (corporateRole === 'DISPATCH_TEAM') return { text: 'Stage 4 only (Documentation & Dispatch) — Approval cleared cases', color: '#065F46', bg: '#D1FAE5' };
    return null;
  };
  const scopeLabel = getScopeLabel();

  const title = () => {
    if (userRole === 'branch') return 'Insurance Cases';
    if (corporateRole === 'VALIDATION_TEAM') return 'Validation Queue';
    if (corporateRole === 'DISPATCH_TEAM') return 'Dispatch Queue';
    return 'All Cases';
  };

  return (
    <div className="fade-in">
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: scopeLabel ? 12 : 20, flexWrap:'wrap', gap:12 }}>
        <h2 style={{ fontSize:30, fontWeight:700 }}>{title()}</h2>
        <div style={{ display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>
          <Button variant="secondary" size="sm" icon="download" onClick={() => {
            exportCSV(filteredDisplay.map(c => ({
              'Case ID': c.id,
              'IP Number': c.ipNumber || '',
              'Patient Name': c.patientName,
              'UHID': c.uhid,
              'Mobile': c.mobile,
              'Branch': c.location,
              'Admission Date': c.admissionDate,
              'Discharge Date': c.dischargeDate,
              'Doctor': c.doctorName || '',
              'Department': c.department || '',
              'Insurance Company': c.insuranceCompany || '',
              'TPA': c.tpaName || '',
              'Policy Number': c.policyNumber || '',
              'Gross Amount': c.grossAmount || '',
              'Net Amount': c.netAmount || '',
              'Insurance Payable': c.insurancePayable || '',
              'Settled Amount': c.settledAmount || '',
              'Settlement Status': c.settlementStatus || '',
              'Workflow Stage': c.workflowStatus || '',
              'Stage Status': c.stages?.[c.workflowStatus]?.status || '',
              'UTR Number': c.utrNumber || '',
              'NEFT Date': c.neftDate || '',
              'FY': c.fy || '',
              'Created At': c.createdAt || ''
            })), `Cloudnine_Cases_${new Date().toISOString().split('T')[0]}.xlsx`);
          }}>Export Excel</Button>
          {userRole === 'branch' && (
            <Button icon="plus" onClick={onNewCase}>New Case</Button>
          )}
        </div>
      </div>

      {/* Role scope banner */}
      {scopeLabel && (
        <div style={{ padding: '9px 16px', background: scopeLabel.bg, borderRadius: 10, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 8, border: `1px solid ${scopeLabel.color}30` }}>
          <Icon name="information-circle" size={15} color={scopeLabel.color}/>
          <span style={{ fontSize: 12, fontWeight: 600, color: scopeLabel.color }}>{scopeLabel.text}</span>
          <span style={{ marginLeft: 'auto', fontSize: 12, color: scopeLabel.color, fontWeight: 700 }}>{cases.length} case{cases.length !== 1 ? 's' : ''} in your queue</span>
        </div>
      )}

      {/* Search Bar */}
      <Card style={{ marginBottom:16, padding:'12px 18px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:14, flexWrap:'wrap' }}>
          <div style={{ flex:1, minWidth:240, position:'relative' }}>
            <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)' }}>
              <Icon name="search" size={15} color="var(--gray-400)"/>
            </div>
            <input
              value={caseSearch}
              onChange={e => setCaseSearch(e.target.value)}
              placeholder="Search by Case ID, Patient Name, UHID or Mobile..."
              style={{ width:'100%', paddingLeft:36, paddingRight:32, height:40, border:'2px solid var(--gray-200)', borderRadius:10, fontSize:13, fontFamily:'Inter', outline:'none', boxSizing:'border-box' }}
              onFocus={e => e.target.style.borderColor='var(--primary)'}
              onBlur={e => e.target.style.borderColor='var(--gray-200)'}
            />
            {caseSearch && (
              <button onClick={() => setCaseSearch('')} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'var(--gray-400)', fontSize:18, lineHeight:1 }}>×</button>
            )}
          </div>
          <div style={{ fontSize:13, color:'var(--gray-500)', whiteSpace:'nowrap' }}>
            {filteredDisplay.length} of {cases.length} case{cases.length !== 1 ? 's' : ''}
            {caseSearch && <span style={{ marginLeft:6, padding:'2px 8px', background:'#EDE9FE', color:'#6B4EE6', borderRadius:10, fontSize:11, fontWeight:600 }}>Filtered</span>}
          </div>
        </div>
      </Card>

      {/* Table */}
      <Card padding={0}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
          <thead>
            <tr style={{ background:'#1A1A2E', color:'#fff' }}>
              {['CASE ID','IP NO.','PATIENT','BRANCH','INSURANCE / TPA','STAGE','DOA','PAYABLE','STATUS','ACTION'].map(h => (
                <th key={h} style={{ padding:'12px 10px', fontWeight:600, fontSize:11, textAlign:'left', letterSpacing:.3 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filteredDisplay.length === 0 && (
              <tr><td colSpan={10} style={{ textAlign:'center', padding:40, color:'var(--gray-400)' }}>
                <Icon name="search" size={32} color="var(--gray-300)"/>
                <div style={{ marginTop:10, fontSize:14 }}>No cases match "<strong>{caseSearch}</strong>"</div>
                <div style={{ fontSize:12, color:'var(--gray-300)', marginTop:4 }}>Try Case ID, patient name, UHID or mobile number</div>
              </td></tr>
            )}
            {filteredDisplay.map((c, i) => {
              const stageStatus = c.stages?.[c.workflowStatus]?.status || 'pending';
              const stageCol = stageCols[c.workflowStatus] || '#999';
              const sColor = statusColors[c.settlementStatus] || '#F3F4F6';
              const sTColor = statusText[c.settlementStatus] || '#374151';
              return (
                <tr key={c.id}
                  style={{ background: i % 2 === 0 ? '#fff' : 'var(--gray-50)', cursor:'pointer', transition:'background .12s' }}
                  onClick={() => onSelectCase(c)}
                  onMouseOver={e => e.currentTarget.style.background='#EDE9FE1A'}
                  onMouseOut={e => e.currentTarget.style.background = i % 2 === 0 ? '#fff' : 'var(--gray-50)'}
                >
                  <td style={{ padding:'13px 10px 13px 16px', fontWeight:700, color:'var(--primary)', fontSize:12 }}>{c.id}</td>
                  <td style={{ padding:'13px 10px', fontSize:12, color:'var(--gray-600)', fontFamily:'monospace', fontWeight:600 }}>{c.ipNumber || <span style={{color:'var(--gray-300)'}}>—</span>}</td>
                  <td style={{ padding:'13px 10px' }}>
                    <div style={{ fontWeight:600, fontSize:13 }}>{c.patientName}</div>
                    <div style={{ fontSize:11, color:'var(--gray-400)' }}>{c.uhid}</div>
                  </td>
                  <td style={{ padding:'13px 10px', fontSize:12, color:'var(--gray-600)' }}>{(c.location||'').replace('Bangalore ','')}</td>
                  <td style={{ padding:'13px 10px', fontSize:12 }}>
                    <div style={{ fontWeight:600 }}>{c.insuranceCompany||'—'}</div>
                    <div style={{ fontSize:11, color:'var(--gray-400)' }}>{c.tpaName||''}</div>
                  </td>
                  <td style={{ padding:'13px 10px' }}>
                    <div style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'3px 9px', borderRadius:20, background:`${stageCol}18`, border:`1px solid ${stageCol}50` }}>
                      <div style={{ width:6, height:6, borderRadius:'50%', background:stageCol, flexShrink:0 }}/>
                      <span style={{ fontSize:11, fontWeight:600, color:stageCol }}>{stageMap2[c.workflowStatus]||c.workflowStatus}</span>
                    </div>
                    <div style={{ fontSize:10, color:'var(--gray-400)', marginTop:2 }}>{stageStatus.toUpperCase()}</div>
                  </td>
                  <td style={{ padding:'13px 10px', fontSize:11, color:'var(--gray-600)' }}>{formatDate(c.admissionDate)}</td>
                  <td style={{ padding:'13px 10px', fontWeight:700, fontSize:12, fontFamily:'monospace' }}>{formatCurrency(c.insurancePayable)}</td>
                  <td style={{ padding:'13px 10px' }}>
                    <span style={{ padding:'3px 10px', borderRadius:20, fontSize:11, fontWeight:700, background:sColor, color:sTColor }}>
                      {(c.settlementStatus||'Pending').toUpperCase()}
                    </span>
                  </td>
                  <td style={{ padding:'13px 10px' }}>
                    <Button variant="secondary" size="sm" onClick={e => { e.stopPropagation(); onSelectCase(c); }}>View</Button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

const App = () => {
  const [screen, setScreen] = useState('login');
  const [userRole, setUserRole] = useState(null);
  const [userBranch, setUserBranch] = useState(null);
  const [corporateRole, setCorporateRole] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [cases, setCases] = useState(INITIAL_CASES);
  const [selectedCase, setSelectedCase] = useState(null);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [toast, setToast] = useState(null);
  const [notifications, setNotifications] = useState([]);
  const [showNotifPanel, setShowNotifPanel] = useState(false);
  const [dashFilter, setDashFilter] = useState(null); // {type, label} for bucket drill-down

  // Run document lifecycle check on mount
  useEffect(() => {
    const updatedCases = DocumentLifecycleManager.checkAndDelete(cases);
    setCases(updatedCases);
  }, []);

  const handleLogin = (role, branchId, corpRole, user) => {
    setUserRole(role);
    setCurrentUser(user);
    
    if (role === 'branch') {
      setUserBranch(branchId);
    } else if (role === 'corporate') {
      setCorporateRole(corpRole);
    }
    
    setScreen(role === 'customer' ? 'customer' : 'main');
    setActiveTab('dashboard');
    setToast({ message: `Welcome, ${user?.name || role}!`, type: 'success' });
  };

  const handleLogout = () => {
    logActivity(currentUser?.id, 'LOGOUT', {});
    setScreen('login');
    setUserRole(null);
    setUserBranch(null);
    setCorporateRole(null);
    setCurrentUser(null);
    setSelectedCase(null);
    setActiveTab('dashboard');
  };

  const handleUpdateCase = (updatedCase) => {
    setCases(cases.map(c => c.id === updatedCase.id ? updatedCase : c));
    if (selectedCase && selectedCase.id === updatedCase.id) setSelectedCase(updatedCase);
  };

  const handleUpdateCases = (newCases) => setCases(newCases);
  
  const handleBulkCreateCases = (newCases) => {
    setCases(prev => [...prev, ...newCases]);
    setToast({ message: `${newCases.length} case${newCases.length!==1?'s':''} imported successfully at Stage 4!`, type: 'success' });
    // Notify all branch users (if we had granular targeting, we'd target each branch)
    newCases.forEach(nc => {
      addNotification({
        id: `notif-${Date.now()}-${nc.id}`,
        type: 'new_case',
        target: 'branch',
        branchCode: nc.branchCode,
        caseId: nc.id,
        patientName: nc.patientName,
        message: `📋 New case created at Stage 4 — ${nc.id} (${nc.patientName}). Please upload documents.`,
        timestamp: new Date().toISOString(),
        read: false
      });
    });
  };
  
  const addNotification = (notif) => {
    setNotifications(prev => [notif, ...prev].slice(0, 50));
    // Also show as a toast briefly
    setToast({ message: notif.message, type: notif.type === 'corporate_approved' ? 'success' : notif.type === 'corporate_query' ? 'warning' : 'info' });
  };

  const getUnreadCount = () => {
    return notifications.filter(n => {
      if (n.read) return false;
      if (userRole === 'branch') return n.target === 'branch' && n.branchCode === userBranch;
      if (userRole === 'corporate') return n.target === 'corporate';
      return false;
    }).length;
  };

  const markAllRead = () => {
    setNotifications(prev => prev.map(n => ({ ...n, read: true })));
  };
  
  const handleCreateCase = (newCase) => {
    setCases([...cases, newCase]);
    setActiveTab('cases');
    setToast({ message: `Case ${newCase.id} created successfully!`, type: 'success' });
    // Notify corporate of new case
    addNotification({
      id: `notif-${Date.now()}`,
      type: 'new_case',
      target: 'corporate',
      caseId: newCase.id,
      patientName: newCase.patientName,
      stage: 'preAuth',
      message: `🆕 New case submitted — ${newCase.id} (${newCase.patientName}) from ${newCase.location}`,
      timestamp: new Date().toISOString(),
      read: false
    });
  };

  const getSelectedBranch = () => userRole === 'branch' && userBranch ? BRANCHES.find(b => b.id === userBranch) : null;

  // Filter cases based on user role and permissions
  const getFilteredCases = () => {
    if (userRole === 'branch') {
      // Branch users can only see their own branch data
      return cases.filter(c => c.branchCode === userBranch);
    } else if (userRole === 'corporate') {
      const roleConfig = CORPORATE_ROLES[corporateRole];
      if (roleConfig?.canViewAllBranches) {
        return cases;
      }
    }
    return cases;
  };

  const renderContent = () => {
    if (selectedCase) {
      return (
        <CaseDetailView 
          caseData={selectedCase} 
          onBack={() => setSelectedCase(null)} 
          onUpdate={handleUpdateCase} 
          userRole={userRole} 
          userBranch={userBranch}
          corporateRole={corporateRole}
          currentUser={currentUser}
          allCases={cases}
          onNavigate={(tab) => { setSelectedCase(null); setActiveTab(tab); }}
          onNewCase={() => { setSelectedCase(null); setActiveTab('new-case'); }}
          onNotify={addNotification}
        />
      );
    }

    switch (activeTab) {
      case 'dashboard': {
        const filteredCases = getFilteredCases();

        // ── Role-aware bucket helpers ───────────────────────────────────────
        // VALIDATOR PENDING: workflowStatus is preAuth / finalBill / approval
        // (meaning stage 3 has NOT been approved yet, so it's still in validator scope)
        // The current active stage must have docs uploaded (status = 'review') 
        // OR any earlier stage is still awaiting approval.
        // Once stage 3 is approved → workflowStatus moves to 'documentation' → GONE from this bucket.
        const validatorPendingCases = filteredCases.filter(c => {
          // If workflowStatus is 'documentation', stage 3 is approved → NOT validator's concern
          if (c.workflowStatus === 'documentation') return false;
          // If ALL of stages 1-3 are already approved → not pending
          const s = c.stages;
          if (s.preAuth?.status === 'approved' && s.finalBill?.status === 'approved' && s.approval?.status === 'approved') return false;
          // Must have at least some activity (docs uploaded to current stage or in review/query)
          const activeStageStatus = s[c.workflowStatus]?.status;
          return activeStageStatus === 'review' || activeStageStatus === 'query' || 
                 (s.preAuth?.docs?.length > 0 && s.preAuth?.status !== 'approved') ||
                 (s.finalBill?.docs?.length > 0 && s.finalBill?.status !== 'approved') ||
                 (s.approval?.docs?.length > 0 && s.approval?.status !== 'approved');
        });

        // DISPATCH PENDING: workflowStatus is 'documentation' (stage 3 approved)
        // AND stage 4 is NOT yet completed/approved.
        // Once stage 4 is completed/approved → GONE from this bucket.
        const dispatchPendingCases = filteredCases.filter(c => {
          if (c.workflowStatus !== 'documentation') return false; // Stage 3 not yet approved
          const docStatus = c.stages.documentation?.status;
          return docStatus !== 'completed' && docStatus !== 'approved';
        });

        // Build buckets based on corporate role
        let buckets;
        if (userRole === 'corporate' && corporateRole === 'DISPATCH_TEAM') {
          // Dispatch team ONLY sees Stage 4 relevant buckets
          const dispatchDone = filteredCases.filter(c => c.stages.documentation?.status === 'completed' || c.stages.documentation?.status === 'approved');
          buckets = [
            { key: 'total', label: 'ALL CASES', color: 'var(--primary)', filter: () => filteredCases },
            { key: 'dispatch_pending', label: 'PENDING — STAGE 4', color: 'var(--warning)', filter: () => dispatchPendingCases },
            { key: 'open_queries', label: 'OPEN QUERIES', color: 'var(--danger)', filter: () => filteredCases.filter(c => c.queries?.some(q => q.status === 'open')) },
            { key: 'completed', label: 'DISPATCHED / DONE', color: 'var(--accent)', filter: () => dispatchDone },
          ];
        } else if (userRole === 'corporate' && corporateRole === 'VALIDATION_TEAM') {
          // Validation team sees Stage 1–3 buckets only
          const validatedDone = filteredCases.filter(c => c.stages.approval?.status === 'approved');
          buckets = [
            { key: 'total', label: 'ALL CASES', color: 'var(--primary)', filter: () => filteredCases },
            { key: 'validator_pending', label: 'PENDING — STAGES 1–3', color: 'var(--warning)', filter: () => validatorPendingCases },
            { key: 'open_queries', label: 'OPEN QUERIES', color: 'var(--danger)', filter: () => filteredCases.filter(c => c.queries?.some(q => q.status === 'open')) },
            { key: 'approved_stages', label: 'STAGES 1–3 APPROVED', color: 'var(--accent)', filter: () => validatedDone },
          ];
        } else if (userRole === 'corporate') {
          // ADMIN / SETTLEMENT see all buckets with clear separation
          const completed = filteredCases.filter(c => c.stages.documentation?.status === 'completed' || c.stages.documentation?.status === 'approved');
          buckets = [
            { key: 'total', label: 'ALL CASES', color: 'var(--primary)', filter: () => filteredCases },
            { key: 'validator_pending', label: 'PENDING VALIDATION (Stg 1–3)', color: 'var(--warning)', filter: () => validatorPendingCases },
            { key: 'dispatch_pending', label: 'PENDING DISPATCH (Stg 4)', color: '#7C3AED', filter: () => dispatchPendingCases },
            { key: 'open_queries', label: 'OPEN QUERIES', color: 'var(--danger)', filter: () => filteredCases.filter(c => c.queries?.some(q => q.status === 'open')) },
            { key: 'completed', label: 'COMPLETED', color: 'var(--accent)', filter: () => completed },
          ];
        } else {
          // Branch users see their own pipeline
          buckets = [
            { key: 'total', label: 'MY CASES', color: 'var(--primary)', filter: () => filteredCases },
            { key: 'pending_review', label: 'AWAITING REVIEW', color: 'var(--warning)', filter: () => filteredCases.filter(c => Object.values(c.stages).some(s => s.status === 'review')) },
            { key: 'open_queries', label: 'OPEN QUERIES', color: 'var(--danger)', filter: () => filteredCases.filter(c => c.queries?.some(q => q.status === 'open')) },
            { key: 'completed', label: 'COMPLETED', color: 'var(--accent)', filter: () => filteredCases.filter(c => c.stages.documentation?.status === 'completed' || c.stages.documentation?.status === 'approved') },
          ];
        }
        // Attach live count
        buckets = buckets.map(b => ({ ...b, count: b.filter().length }));

        const activeBucket = dashFilter ? buckets.find(b => b.key === dashFilter) : null;
        const displayCases = activeBucket ? activeBucket.filter() : [];
        const stageColors = { preAuth:'#6B4EE6', finalBill:'#FF6B9D', approval:'#FFB800', documentation:'#00D4AA' };
        const stageLabels = { preAuth:'Pre-Auth', finalBill:'Final Bill', approval:'Approval', documentation:'Documentation' };

        return (
          <div className="fade-in">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24, flexWrap: 'wrap', gap: 16 }}>
              <h2 style={{ fontSize: 30, fontWeight: 700 }}>Dashboard</h2>
              <CaseSearch cases={filteredCases} onSelectCase={(c) => setSelectedCase(c)} compact={true} placeholder="Quick search cases..." />
            </div>

            {/* Clickable bucket cards */}
            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${buckets.length}, 1fr)`, gap: 16, marginBottom: 24 }}>
              {buckets.map(bucket => (
                <div key={bucket.key} onClick={() => setDashFilter(dashFilter === bucket.key ? null : bucket.key)}
                  className="metric-card" style={{ cursor: 'pointer', borderColor: dashFilter === bucket.key ? bucket.color : 'var(--gray-200)', background: dashFilter === bucket.key ? `${bucket.color}08` : '#fff', transition: 'all 0.2s', boxShadow: dashFilter === bucket.key ? `0 0 0 2px ${bucket.color}40, var(--shadow)` : 'var(--shadow)' }}>
                  <div className="metric-label">{bucket.label}</div>
                  <div className="metric-value" style={{ color: bucket.color, marginTop: 8 }}>{bucket.count}</div>
                  <div style={{ fontSize: 11, color: 'var(--gray-400)', marginTop: 6, fontWeight: 500 }}>
                    {dashFilter === bucket.key ? '▲ Click to collapse' : '▼ Click to view cases'}
                  </div>
                </div>
              ))}
            </div>

            {/* Drill-down case list */}
            {dashFilter && activeBucket && (
              <Card style={{ marginBottom: 24 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                  <h3 style={{ fontSize: 16, fontWeight: 700, color: activeBucket.color }}>{activeBucket.label} — {displayCases.length} case{displayCases.length !== 1 ? 's' : ''}</h3>
                  <button onClick={() => setDashFilter(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--gray-400)', fontSize: 18 }}>×</button>
                </div>
                {displayCases.length === 0 ? (
                  <div style={{ textAlign: 'center', padding: 32, color: 'var(--gray-400)' }}>No cases in this bucket</div>
                ) : (
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                    <thead>
                      <tr style={{ background: 'var(--gray-50)' }}>
                        {['Case ID', 'Patient', 'Branch', 'Active Stage', 'Stage Status', 'Insurance', ''].map(h => (
                          <th key={h} style={{ padding: '10px 12px', textAlign: 'left', fontWeight: 700, fontSize: 11, color: 'var(--gray-500)', letterSpacing: '0.04em', textTransform: 'uppercase', borderBottom: '1px solid var(--gray-200)' }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {displayCases.map((c, i) => {
                        const activeStatus = c.stages?.[c.workflowStatus]?.status || 'pending';
                        const statusColorMap = { review: 'var(--primary)', query: 'var(--danger)', approved: 'var(--accent)', completed: 'var(--accent)', pending: 'var(--gray-400)' };
                        const statusBgMap = { review: '#DBEAFE', query: '#FEE2E2', approved: '#D1FAE5', completed: '#D1FAE5', pending: 'var(--gray-100)' };
                        return (
                          <tr key={c.id} style={{ background: i % 2 === 0 ? '#fff' : 'var(--gray-50)', cursor: 'pointer' }}
                            onMouseEnter={e => e.currentTarget.style.background = 'rgba(27,79,138,0.04)'}
                            onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? '#fff' : 'var(--gray-50)'}>
                            <td style={{ padding: '10px 12px', fontWeight: 700, color: 'var(--primary)' }}>{c.id}</td>
                            <td style={{ padding: '10px 12px', fontWeight: 600 }}>{c.patientName}</td>
                            <td style={{ padding: '10px 12px', fontSize: 12, color: 'var(--gray-500)' }}>{c.location?.replace('Bangalore ','')}</td>
                            <td style={{ padding: '10px 12px' }}>
                              <span style={{ padding: '2px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700, background: `${stageColors[c.workflowStatus] || '#6B4EE6'}18`, color: stageColors[c.workflowStatus] || '#6B4EE6' }}>
                                {stageLabels[c.workflowStatus] || c.workflowStatus}
                              </span>
                            </td>
                            <td style={{ padding: '10px 12px' }}>
                              <span style={{ padding: '2px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700, background: statusBgMap[activeStatus], color: statusColorMap[activeStatus], textTransform: 'uppercase' }}>
                                {activeStatus}
                              </span>
                            </td>
                            <td style={{ padding: '10px 12px', fontSize: 12 }}>{c.insuranceCompany}</td>
                            <td style={{ padding: '10px 12px' }}>
                              <Button variant="secondary" size="sm" onClick={() => { setDashFilter(null); setSelectedCase(c); }}>View</Button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </Card>
            )}
            
            {/* Branch-wise Case Summary - Only for corporate users */}
            {userRole === 'corporate' && !dashFilter && (
              <Card style={{ marginTop: 8 }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>Branch-wise Summary</h3>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                  <thead>
                    <tr style={{ background: 'var(--gray-50)' }}>
                      <th style={{ padding: '11px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--gray-500)', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid var(--gray-200)' }}>Branch</th>
                      {['Total Cases', 'Pending', 'Dispatched', 'Settled', 'Short Paid'].map(h => (
                        <th key={h} style={{ padding: '11px 14px', textAlign: 'center', fontSize: 11, fontWeight: 700, color: 'var(--gray-500)', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid var(--gray-200)' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {BRANCHES.map((branch, i) => {
                      const branchCases = cases.filter(c => c.branchCode === branch.id);
                      return (
                        <tr key={branch.id} style={{ background: i % 2 === 0 ? '#fff' : 'var(--gray-50)' }}>
                          <td style={{ padding: '12px 14px', fontWeight: 600 }}>{branch.name}</td>
                          <td style={{ textAlign: 'center', padding: '12px 14px' }}><span style={{ fontWeight: 700, color: 'var(--primary)' }}>{branchCases.length}</span></td>
                          <td style={{ textAlign: 'center', padding: '12px 14px' }}><span style={{ color: branchCases.filter(c=>c.settlementStatus==='Pending').length>0?'var(--warning)':'var(--gray-400)', fontWeight: 600 }}>{branchCases.filter(c => c.settlementStatus === 'Pending').length}</span></td>
                          <td style={{ textAlign: 'center', padding: '12px 14px' }}><span style={{ color: 'var(--info)', fontWeight: 600 }}>{branchCases.filter(c => c.settlementStatus === 'Dispatched').length}</span></td>
                          <td style={{ textAlign: 'center', padding: '12px 14px' }}><span style={{ color: 'var(--accent)', fontWeight: 600 }}>{branchCases.filter(c => c.settlementStatus === 'Settled').length}</span></td>
                          <td style={{ textAlign: 'center', padding: '12px 14px' }}><span style={{ color: branchCases.filter(c=>c.settlementStatus==='Short Paid').length>0?'var(--danger)':'var(--gray-400)', fontWeight: 600 }}>{branchCases.filter(c => c.settlementStatus === 'Short Paid').length}</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </Card>
            )}
          </div>
        );
      }
      case 'cases':
      case 'review': {
        // Filter cases based on corporate role — mirrors dashboard bucket logic exactly
        let reviewCases = getFilteredCases();
        if (userRole === 'corporate' && corporateRole === 'VALIDATION_TEAM') {
          // Only show cases still in stages 1–3 (workflowStatus is NOT 'documentation')
          reviewCases = reviewCases.filter(c => c.workflowStatus !== 'documentation');
        } else if (userRole === 'corporate' && corporateRole === 'DISPATCH_TEAM') {
          // Only show cases in stage 4 (workflowStatus === 'documentation')
          reviewCases = reviewCases.filter(c => c.workflowStatus === 'documentation');
        }
        return <CasesListView
          cases={reviewCases}
          userRole={userRole}
          userBranch={userBranch}
          corporateRole={corporateRole}
          onSelectCase={setSelectedCase}
          onNewCase={() => setActiveTab('new-case')}
        />;
      }
      case 'new-case':
        return <NewCaseForm branchId={userBranch} onBack={() => setActiveTab('cases')} onSave={handleCreateCase} existingCases={cases} />;
      case 'stage4-case':
        return <Stage4CaseForm corporateRole={corporateRole} cases={cases} branches={BRANCHES} onBack={() => setActiveTab('cases')} onSave={(newCase) => { handleCreateCase(newCase); setActiveTab('cases'); }}/>;
      case 'bulk-upload':
        return <BulkUploadView cases={cases} onBulkCreate={handleBulkCreateCases} onUpdateCases={setCases} onBack={() => setActiveTab('cases')}/>;
      case 'reconciliation':
        return <ReconciliationView cases={cases} onUpdateCases={handleUpdateCases} userRole={userRole} corporateRole={corporateRole} />;
      case 'user-management':
        return <UserManagement currentUser={currentUser} />;
      case 'dispatch':
        return (
          <div className="fade-in">
            <h2 style={{ fontSize: 32, fontWeight: 700, marginBottom: 24 }}>Dispatch Management</h2>
            <Card>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                <thead><tr style={{ background: 'var(--gray-50)' }}><th style={{ padding: '16px', textAlign: 'left' }}>Case ID</th><th>Patient</th><th>Branch</th><th>Courier</th><th>Tracking</th><th>Status</th></tr></thead>
                <tbody>
                  {cases.filter(c => c.stages.approval.status === 'approved').map((c, i) => (
                    <tr key={c.id} style={{ background: i % 2 === 0 ? '#fff' : 'var(--gray-50)' }}>
                      <td style={{ padding: '16px', fontWeight: 600 }}>{c.id}</td>
                      <td>{c.patientName}</td>
                      <td>{c.location}</td>
                      <td>{c.podDetails?.courierName || '-'}</td>
                      <td>{c.podDetails?.trackingNumber || '-'}</td>
                      <td><span className={`status-${c.settlementStatus.toLowerCase().replace(' ', '-')}`}>{c.settlementStatus.toUpperCase()}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Card>
          </div>
        );
      case 'queries': {
        const allCasesForQ = getFilteredCases();
        const allQueries = allCasesForQ.flatMap(c => (c.queries || []).map(q => ({ ...q, caseId: c.id, patientName: c.patientName, branch: c.location, insuranceCompany: c.insuranceCompany })));
        const openQ = allQueries.filter(q => q.status === 'open');
        const resolvedQ = allQueries.filter(q => q.status !== 'open');
        return (
          <div className="fade-in">
            <h2 style={{ fontSize: 32, fontWeight: 700, marginBottom: 8 }}>Queries & Clarifications</h2>
            <p style={{ color: 'var(--gray-500)', marginBottom: 24 }}>{openQ.length} open · {resolvedQ.length} resolved</p>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 14, marginBottom: 24 }}>
              <Card><div style={{fontSize:12,color:'var(--gray-500)',fontWeight:600}}>OPEN QUERIES</div><div style={{fontSize:32,fontWeight:700,color:'var(--danger)'}}>{openQ.length}</div></Card>
              <Card><div style={{fontSize:12,color:'var(--gray-500)',fontWeight:600}}>RESOLVED</div><div style={{fontSize:32,fontWeight:700,color:'var(--accent)'}}>{resolvedQ.length}</div></Card>
              <Card><div style={{fontSize:12,color:'var(--gray-500)',fontWeight:600}}>TOTAL CASES WITH QUERIES</div><div style={{fontSize:32,fontWeight:700,color:'var(--primary)'}}>{allCasesForQ.filter(c=>c.queries?.length>0).length}</div></Card>
            </div>
            {openQ.length > 0 && (
              <Card style={{ marginBottom: 20 }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16, color: 'var(--danger)' }}>⚠ Open Queries</h3>
                {openQ.map((q, i) => (
                  <div key={i} style={{ padding: '14px 16px', background: '#FEF3C7', borderRadius: 10, marginBottom: 10, borderLeft: '4px solid var(--warning)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                      <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                        <span style={{ fontWeight: 700, color: 'var(--primary)', fontSize: 13 }}>{q.caseId}</span>
                        <span style={{ fontSize: 12, color: 'var(--gray-500)' }}>·</span>
                        <span style={{ fontSize: 13 }}>{q.patientName}</span>
                        <span style={{ fontSize: 11, background: '#E0E7FF', color: '#3730A3', padding: '2px 8px', borderRadius: 10 }}>{q.stage}</span>
                      </div>
                      <span style={{ fontSize: 11, color: 'var(--gray-400)' }}>{formatDate(q.raisedAt)}</span>
                    </div>
                    <div style={{ fontSize: 13, color: '#7F1D1D', fontWeight: 500 }}>{q.query}</div>
                    <div style={{ fontSize: 11, color: 'var(--gray-500)', marginTop: 4 }}>Raised by: {q.raisedBy} · {q.branch}</div>
                    <Button variant="success" size="sm" style={{ marginTop: 10 }} onClick={() => {
                      setCases(prev => prev.map(c => c.id === q.caseId ? { ...c, queries: c.queries.map(qr => qr.id === q.id ? { ...qr, status: 'resolved' } : qr) } : c));
                    }}>Mark Resolved</Button>
                  </div>
                ))}
              </Card>
            )}
            {resolvedQ.length > 0 && (
              <Card>
                <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16, color: 'var(--accent)' }}>✓ Resolved Queries</h3>
                {resolvedQ.map((q, i) => (
                  <div key={i} style={{ padding: '12px 14px', background: '#F0FDF4', borderRadius: 10, marginBottom: 8, borderLeft: '4px solid var(--accent)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                      <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                        <span style={{ fontWeight: 700, color: 'var(--primary)', fontSize: 13 }}>{q.caseId}</span>
                        <span style={{ fontSize: 13 }}>{q.patientName}</span>
                        <span style={{ fontSize: 11, background: '#D1FAE5', color: '#065F46', padding: '2px 8px', borderRadius: 10 }}>resolved</span>
                      </div>
                      <span style={{ fontSize: 11, color: 'var(--gray-400)' }}>{formatDate(q.raisedAt)}</span>
                    </div>
                    <div style={{ fontSize: 13, color: 'var(--gray-600)' }}>{q.query}</div>
                  </div>
                ))}
              </Card>
            )}
            {allQueries.length === 0 && (
              <Card style={{ textAlign: 'center', padding: 48 }}>
                <Icon name="check-circle" size={48} color="var(--accent)"/>
                <h3 style={{ marginTop: 16, fontWeight: 700 }}>No Queries</h3>
                <p style={{ color: 'var(--gray-500)' }}>All cases are clear — no open queries at this time.</p>
              </Card>
            )}
          </div>
        );
      }
      case 'reports': {
        const rCases = getFilteredCases();
        const fySet = [...new Set(rCases.map(c => c.fy))].filter(Boolean);
        const insSet = [...new Set(rCases.map(c => c.insuranceCompany))].filter(Boolean);
        const fyBarData = fySet.map(fy => {
          const fc = rCases.filter(c => c.fy === fy);
          return { name: fy, billed: Math.round(fc.reduce((s, c) => s + (c.grossAmount||0), 0)/1000), payable: Math.round(fc.reduce((s, c) => s + (c.insurancePayable||0), 0)/1000), settled: Math.round(fc.filter(c=>c.settlementStatus==='Settled').reduce((s, c) => s + (c.settledAmount||0), 0)/1000) };
        });
        const insBarData = insSet.slice(0,6).map(ins => {
          const ic = rCases.filter(c => c.insuranceCompany === ins);
          return { name: ins.replace(' Insurance','').replace('Assurance','Ass.'), count: ic.length, payable: Math.round(ic.reduce((s,c)=>s+(c.insurancePayable||0),0)/1000), settled: Math.round(ic.filter(c=>c.settlementStatus==='Settled').reduce((s,c)=>s+(c.settledAmount||0),0)/1000) };
        });
        const stageData = [
          {name:'Pre-Auth',value:rCases.filter(c=>c.workflowStatus==='preAuth').length,color:'#6B4EE6'},
          {name:'Final Bill',value:rCases.filter(c=>c.workflowStatus==='finalBill').length,color:'#FF6B9D'},
          {name:'Approval',value:rCases.filter(c=>c.workflowStatus==='approval').length,color:'#FFB800'},
          {name:'Documentation',value:rCases.filter(c=>c.workflowStatus==='documentation').length,color:'#00D4AA'},
        ];
        return (
          <div className="fade-in">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
              <div><h2 style={{ fontSize: 32, fontWeight: 700, marginBottom: 4 }}>Reports & Analytics</h2><p style={{ color: 'var(--gray-500)' }}>Comprehensive insurance performance insights</p></div>
              <Button variant="secondary" size="sm" icon="download" onClick={() => exportCSV(rCases.map(c=>({'Case ID':c.id,'Patient':c.patientName,'Branch':c.location,'FY':c.fy,'Insurance':c.insuranceCompany,'TPA':c.tpaName,'Gross Amount':c.grossAmount,'Net Amount':c.netAmount,'Insurance Payable':c.insurancePayable,'Settled Amount':c.settledAmount||'','Status':c.settlementStatus,'Stage':c.workflowStatus,'UTR':c.utrNumber||'','NEFT Date':c.neftDate||'','Aging Days':calculateAging(c.dischargeDate),'Package':INSURANCE_PACKAGES[c.packageType]?.name||c.packageType})),'CloudNine_Full_Report.xlsx')}>Export Full Report</Button>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 14, marginBottom: 24 }}>
              {[{l:'Total Cases',v:rCases.length,c:'var(--primary)'},{l:'Total Payable',v:formatCurrency(rCases.reduce((s,c)=>s+(c.insurancePayable||0),0)),c:'var(--warning)',sm:true},{l:'Total Settled',v:formatCurrency(rCases.filter(c=>c.settlementStatus==='Settled').reduce((s,c)=>s+(c.settledAmount||0),0)),c:'var(--accent)',sm:true},{l:'Open Queries',v:rCases.reduce((s,c)=>s+(c.queries||[]).filter(q=>q.status==='open').length,0),c:'var(--danger)'}].map((s,i)=>(
                <Card key={i}><div style={{fontSize:12,color:'var(--gray-500)',fontWeight:600}}>{s.l}</div><div style={{fontSize:s.sm?18:32,fontWeight:700,color:s.c,marginTop:4}}>{s.v}</div></Card>
              ))}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
              <Card>
                <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>FY Wise — Billed vs Payable vs Settled (₹K)</h3>
                <SVGBarChart data={fyBarData} xKey="name" bars={[{key:'billed',name:'Billed',color:'#3498DB'},{key:'payable',name:'Payable',color:'#FFB800'},{key:'settled',name:'Settled',color:'#00D4AA'}]} height={220} formatY={v=>`₹${v}K`}/>
              </Card>
              <Card>
                <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>Insurance Wise Payable vs Settled (₹K)</h3>
                <SVGBarChart data={insBarData} xKey="name" bars={[{key:'payable',name:'Payable',color:'#6B4EE6'},{key:'settled',name:'Settled',color:'#00D4AA'}]} height={220} formatY={v=>`₹${v}K`}/>
              </Card>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
              <Card>
                <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>Cases by Workflow Stage</h3>
                <SVGDonut data={stageData} height={200}/>
              </Card>
              <Card>
                <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>TPA Wise Payable (₹K)</h3>
                <SVGHBar data={[...new Set(rCases.map(c=>c.tpaName))].filter(Boolean).map(t=>({name:t,val:Math.round(rCases.filter(c=>c.tpaName===t).reduce((s,c)=>s+(c.insurancePayable||0),0)/1000)}))} xKey="name" valKey="val" color="#FF6B9D" height={200} fmt={v=>`₹${v}K`}/>
              </Card>
            </div>
            <Card>
              <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Insurance Summary Table</h3>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead><tr style={{background:'#1A1A2E',color:'#fff'}}>
                    {['Insurance Co','TPA','Cases','Billed Total','Net Payable','Settled','Outstanding','Short Paid','% Settled'].map(h=><th key={h} style={{padding:'10px 12px',textAlign:'left',fontWeight:600,fontSize:11}}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {insSet.map((ins,i)=>{
                      const ic=rCases.filter(c=>c.insuranceCompany===ins);
                      const billed=ic.reduce((s,c)=>s+(c.grossAmount||0),0);
                      const payable=ic.reduce((s,c)=>s+(c.insurancePayable||0),0);
                      const settled=ic.filter(c=>c.settlementStatus==='Settled').reduce((s,c)=>s+(c.settledAmount||0),0);
                      const outstanding=ic.filter(c=>c.settlementStatus!=='Settled').reduce((s,c)=>s+(c.insurancePayable||0),0);
                      const sp=ic.filter(c=>c.settlementStatus==='Short Paid').length;
                      const pct=payable>0?((settled/payable)*100).toFixed(0):0;
                      const tpa=[...new Set(ic.map(c=>c.tpaName))].join(', ');
                      return <tr key={ins} style={{background:i%2===0?'#fff':'var(--gray-50)'}}>
                        <td style={{padding:'10px 12px',fontWeight:600}}>{ins}</td>
                        <td style={{padding:'10px 12px',fontSize:11,color:'var(--gray-500)'}}>{tpa||'—'}</td>
                        <td style={{padding:'10px 12px',textAlign:'center'}}>{ic.length}</td>
                        <td style={{padding:'10px 12px',fontFamily:'monospace'}}>{formatCurrency(billed)}</td>
                        <td style={{padding:'10px 12px',fontFamily:'monospace',fontWeight:600}}>{formatCurrency(payable)}</td>
                        <td style={{padding:'10px 12px',fontFamily:'monospace',color:'var(--accent)',fontWeight:600}}>{formatCurrency(settled)}</td>
                        <td style={{padding:'10px 12px',fontFamily:'monospace',color:'var(--warning)',fontWeight:600}}>{formatCurrency(outstanding)}</td>
                        <td style={{padding:'10px 12px',textAlign:'center',color:sp>0?'var(--danger)':'var(--gray-400)',fontWeight:600}}>{sp}</td>
                        <td style={{padding:'10px 12px'}}><div style={{background:'var(--gray-200)',borderRadius:4,height:8,width:80}}><div style={{background:Number(pct)>60?'var(--accent)':'var(--warning)',height:'100%',borderRadius:4,width:`${Math.min(pct,100)}%`}}/></div><span style={{fontSize:10,color:'var(--gray-500)',marginLeft:4}}>{pct}%</span></td>
                      </tr>;
                    })}
                  </tbody>
                </table>
              </div>
            </Card>
          </div>
        );
      }
      case 'audit-log': {
        return (
          <div className="fade-in">
            <h2 style={{ fontSize: 32, fontWeight: 700, marginBottom: 24 }}>Audit Log</h2>
            <Card>
              <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>System Activity Log</h3>
              {USER_ACTIVITY_LOG.length === 0 ? (
                <div style={{ textAlign: 'center', padding: 32, color: 'var(--gray-400)' }}>
                  <Icon name="history" size={40} color="var(--gray-300)"/>
                  <p style={{ marginTop: 12 }}>No activity logged yet. Actions will appear here.</p>
                </div>
              ) : (
                <table className="user-table">
                  <thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th>Details</th></tr></thead>
                  <tbody>{USER_ACTIVITY_LOG.slice().reverse().map((log,i)=>(
                    <tr key={i}><td>{new Date(log.timestamp).toLocaleString()}</td><td>{log.userId}</td><td><span style={{padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:600,background:log.action.includes('LOGIN')?'#DBEAFE':log.action.includes('LOGOUT')?'#FEE2E2':'#D1FAE5',color:log.action.includes('LOGIN')?'#1E40AF':log.action.includes('LOGOUT')?'#991B1B':'#065F46'}}>{log.action}</span></td><td style={{fontSize:12,color:'var(--gray-500)'}}>{JSON.stringify(log.details)}</td></tr>
                  ))}</tbody>
                </table>
              )}
            </Card>
          </div>
        );
      }
      default:
        return <div className="fade-in"><Card style={{ padding: 48, textAlign: 'center' }}><Icon name="cog" size={48} color="var(--gray-400)"/><h3 style={{ marginTop: 16 }}>Coming Soon</h3></Card></div>;
    }
  };

  if (screen === 'login') return <LoginScreen onLogin={handleLogin} />;
  if (screen === 'customer') return <CustomerPortal onBack={() => setScreen('login')} />;

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      <Sidebar 
        role={userRole} 
        activeTab={activeTab} 
        setActiveTab={setActiveTab} 
        onLogout={handleLogout} 
        collapsed={sidebarCollapsed} 
        setCollapsed={setSidebarCollapsed} 
        selectedBranch={getSelectedBranch()}
        corporateRole={corporateRole}
      />
      <div style={{ flex: 1, marginLeft: sidebarCollapsed ? 80 : 280, minHeight: '100vh', background: 'var(--gray-50)', transition: 'margin-left 0.3s' }}>
        {/* Global Search Header */}
        <div style={{ position: 'sticky', top: 0, zIndex: 100, background: 'rgba(247,249,252,0.95)', backdropFilter: 'blur(12px)', borderBottom: '1px solid var(--gray-200)', padding: '10px 32px', display: 'flex', alignItems: 'center', gap: 16 }}>
          <CaseSearch
            cases={getFilteredCases()}
            onSelectCase={(c) => { setSelectedCase(c); }}
            placeholder="Search any case by ID, patient name, UHID or mobile..."
          />
          {currentUser && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginLeft: 'auto', flexShrink: 0 }}>
              {/* Notification Bell */}
              <div style={{ position: 'relative' }}>
                <button onClick={() => { setShowNotifPanel(!showNotifPanel); if (!showNotifPanel) markAllRead(); }}
                  style={{ background: showNotifPanel ? 'var(--gray-100)' : 'transparent', border: '1.5px solid var(--gray-200)', borderRadius: 10, padding: '7px 10px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, position: 'relative', color: 'var(--gray-600)', fontWeight: 600, fontSize: 13 }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                  {getUnreadCount() > 0 && (
                    <span style={{ position: 'absolute', top: -6, right: -6, background: 'var(--danger)', color: '#fff', borderRadius: '50%', width: 18, height: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, border: '2px solid #fff' }}>
                      {getUnreadCount() > 9 ? '9+' : getUnreadCount()}
                    </span>
                  )}
                </button>
                {/* Notification Dropdown */}
                {showNotifPanel && (
                  <div style={{ position: 'absolute', top: 44, right: 0, width: 380, background: '#fff', borderRadius: 14, boxShadow: 'var(--shadow-xl)', border: '1px solid var(--gray-200)', zIndex: 500, overflow: 'hidden' }}>
                    <div style={{ padding: '14px 16px', borderBottom: '1px solid var(--gray-100)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <span style={{ fontWeight: 700, fontSize: 14 }}>Notifications</span>
                      <button onClick={() => setShowNotifPanel(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--gray-400)', fontSize: 18 }}>×</button>
                    </div>
                    <div style={{ maxHeight: 380, overflowY: 'auto' }}>
                      {notifications.filter(n => {
                        if (userRole === 'branch') return n.target === 'branch' && n.branchCode === userBranch;
                        if (userRole === 'corporate') return n.target === 'corporate';
                        return false;
                      }).length === 0 ? (
                        <div style={{ padding: '32px 16px', textAlign: 'center', color: 'var(--gray-400)' }}>
                          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{ marginBottom: 8 }}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                          <div style={{ fontSize: 13 }}>No notifications yet</div>
                        </div>
                      ) : (
                        notifications.filter(n => {
                          if (userRole === 'branch') return n.target === 'branch' && n.branchCode === userBranch;
                          if (userRole === 'corporate') return n.target === 'corporate';
                          return false;
                        }).map((n, i) => (
                          <div key={n.id} onClick={() => {
                            setShowNotifPanel(false);
                            const found = cases.find(c => c.id === n.caseId);
                            if (found) setSelectedCase(found);
                          }}
                            style={{ padding: '12px 16px', borderBottom: '1px solid var(--gray-100)', cursor: 'pointer', background: n.read ? '#fff' : 'rgba(27,79,138,0.04)', transition: 'background 0.15s' }}
                            onMouseEnter={e => e.currentTarget.style.background = 'var(--gray-50)'}
                            onMouseLeave={e => e.currentTarget.style.background = n.read ? '#fff' : 'rgba(27,79,138,0.04)'}>
                            <div style={{ fontSize: 13, fontWeight: n.read ? 400 : 600, color: 'var(--text)', lineHeight: 1.4 }}>{n.message}</div>
                            <div style={{ fontSize: 11, color: 'var(--gray-400)', marginTop: 4 }}>{new Date(n.timestamp).toLocaleString()}</div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}
              </div>
              <div style={{ width: 34, height: 34, borderRadius: '50%', background: 'var(--primary)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 13, flexShrink: 0 }}>
                {(currentUser.name || currentUser.username || '?')[0].toUpperCase()}
              </div>
              <div style={{ fontSize: 12 }}>
                <div style={{ fontWeight: 700, color: 'var(--gray-800)' }}>{currentUser.name || currentUser.username}</div>
                <div style={{ color: 'var(--gray-400)', fontSize: 11 }}>{corporateRole ? corporateRole.replace('_',' ') : userBranch ? `Branch: ${userBranch}` : ''}</div>
              </div>
            </div>
          )}
        </div>
        <div style={{ maxWidth: 1440, margin: '0 auto', padding: '28px 32px' }}>{renderContent()}</div>
      </div>
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
