                        <td style={{ padding:'8px 11px', fontSize:11 }}>{r.neftDate || '—'}</td>
                        <td style={{ padding:'8px 11px' }}>
                          {r.matched
                            ? <span style={{ padding:'3px 8px', background:'#D1FAE5', color:'#065F46', borderRadius:10, fontSize:10, fontWeight:700 }}>✓ FOUND</span>
                            : <span style={{ padding:'3px 8px', background:'#FEE2E2', color:'#991B1B', borderRadius:10, fontSize:10, fontWeight:700 }}>NOT FOUND</span>
                          }
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
          <div style={{ display:'flex', alignItems:'center', gap:12, justifyContent:'flex-end' }}>
            <span style={{ fontSize:13, color:'var(--gray-500)' }}>{selectedCount} case{selectedCount!==1?'s':''} will be updated</span>
            <Button variant="secondary" onClick={() => setBsStep('upload')}>Re-upload</Button>
            <Button onClick={handleBulkSettle} disabled={selectedCount===0||bsProcessing} icon="save" style={{ minWidth:200 }}>
              {bsProcessing ? 'Updating...' : `Update ${selectedCount} Settlement${selectedCount!==1?'s':''}`}
            </Button>
          </div>
        </div>
      );
    }

    return (
      <div className="fade-in">
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
          <Button variant="secondary" size="sm" onClick={() => setViewMode('dashboard')} icon="arrow_left">Back</Button>
          <div>
            <h2 style={{ fontSize:24, fontWeight:700 }}>Bulk Settlement Upload</h2>
            <p style={{ fontSize:13, color:'var(--gray-500)', marginTop:2 }}>Upload an Excel/CSV file to update settlement status for multiple cases at once</p>
          </div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:20 }}>
          <Card style={{ borderLeft:'4px solid var(--primary)' }}>
            <h3 style={{ fontSize:14, fontWeight:700, marginBottom:12 }}>📋 How it works</h3>
            <div style={{ fontSize:13, color:'var(--gray-600)', lineHeight:1.85 }}>
              <div><b>1.</b> Download the template below or use your Settlement Tracker export</div>
              <div><b>2.</b> Fill in: <b>Case ID</b> or <b>IP #</b>, Status, Amount, UTR, NEFT Date</div>
              <div><b>3.</b> Upload the file here — system matches by Case ID or IP #</div>
              <div><b>4.</b> Review matched rows, confirm, and apply bulk update</div>
            </div>
          </Card>
          <Card style={{ borderLeft:'4px solid var(--accent)' }}>
            <h3 style={{ fontSize:14, fontWeight:700, marginBottom:10 }}>📊 Required Columns</h3>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'4px 16px', fontSize:12, marginBottom:14 }}>
              {[['IP ID / Case ID','Case identifier'],['IP Number','IP # (alternate)'],['Status','Settled / Short Paid / Pending'],['Payment received','Amount settled'],['NEFT Number','UTR number'],['NEFT Date','Date of payment'],['Remarks','Optional notes']].map(([col,desc])=>(
                <div key={col} style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <code style={{ background:'#EFF6FF', color:'var(--primary)', padding:'1px 5px', borderRadius:4, fontSize:11, fontFamily:'monospace', flexShrink:0 }}>{col}</code>
                  <span style={{ color:'var(--gray-400)', fontSize:10 }}>{desc}</span>
                </div>
              ))}
            </div>
            <Button variant="secondary" size="sm" icon="download" onClick={downloadBsTemplate}>Download Template</Button>
          </Card>
        </div>
        {bsError && <div style={{ padding:'10px 16px', background:'#FEE2E2', borderRadius:10, marginBottom:16, color:'#991B1B', fontSize:13 }}>⚠ {bsError}</div>}
        <Card>
          <div className="upload-zone" onClick={() => bsRef.current.click()}
            onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('has-files');}}
            onDragLeave={e=>e.currentTarget.classList.remove('has-files')}
            onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('has-files');const f=e.dataTransfer.files[0];if(f)parseBulkSettlement(f);}}>
            <input ref={bsRef} type="file" accept=".csv,.xlsx,.xls" style={{ display:'none' }} onChange={e=>{if(e.target.files[0])parseBulkSettlement(e.target.files[0]);e.target.value='';}}/>
            <Icon name="upload" size={32} color="var(--gray-400)" style={{ marginBottom:8 }}/>
            <div style={{ fontSize:15, fontWeight:600, color:'var(--gray-600)', marginBottom:4 }}>Drop your Settlement Excel / CSV here</div>
            <div style={{ fontSize:12, color:'var(--gray-400)' }}>or click to browse · .xlsx, .xls, .csv accepted</div>
          </div>
        </Card>
      </div>
    );
  };

  return (
    <div className="fade-in">
      {viewMode === 'dashboard' && renderDashboard()}
      {viewMode === 'aging' && renderAgingView()}
      {viewMode === 'insurance' && renderInsuranceView()}
      {viewMode === 'location' && renderLocationView()}
      {viewMode === 'table' && renderTableView()}
      {viewMode === 'bulk-settle' && renderBulkSettlementUpload()}

      {editingCase && (
        <div className="modal-overlay" onClick={() => setEditingCase(null)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 24 }}>
              <h3 style={{ fontSize: 20, fontWeight: 700 }}>Edit Case: {editingCase.id}</h3>
              <button onClick={() => setEditingCase(null)} style={{ background: 'none', border: 'none', cursor: 'pointer' }}><Icon name="close" size={24}/></button>
            </div>
            <div style={{ padding: 16, background: 'var(--gray-50)', borderRadius: 8, marginBottom: 16 }}>
              <div style={{ fontSize: 12, color: 'var(--gray-500)' }}>Insurance Payable</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: 'var(--primary)' }}>{formatCurrency(editingCase.insurancePayable)}</div>
            </div>
            
            {editingCase.settledDate && (
              <div className="delete-warning">
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontWeight: 600, marginBottom: 8 }}>
                  <Icon name="clock" size={16}/>
                  Document Deletion Schedule
                </div>
                <DocumentDeletionCountdown settlementDate={editingCase.settledDate} />
              </div>
            )}

            <div style={{ display: 'grid', gap: 16 }}>
              <Input label="Courier Name" value={editingCase.podDetails?.courierName || ''} onChange={(e) => setEditingCase({...editingCase, podDetails: {...editingCase.podDetails, courierName: e.target.value}})} />
              <Input label="Tracking Number" value={editingCase.podDetails?.trackingNumber || ''} onChange={(e) => setEditingCase({...editingCase, podDetails: {...editingCase.podDetails, trackingNumber: e.target.value}})} />
              <Input label="Dispatch Date" type="date" value={editingCase.podDetails?.dispatchDate || ''} onChange={(e) => setEditingCase({...editingCase, podDetails: {...editingCase.podDetails, dispatchDate: e.target.value}})} />
              <hr style={{ border: 'none', borderTop: '1px solid var(--gray-200)' }}/>
              <Input label="Settled Amount" type="number" value={editingCase.settledAmount || ''} onChange={(e) => setEditingCase({...editingCase, settledAmount: e.target.value})} />
              <Input label="UTR Number" value={editingCase.utrNumber || ''} onChange={(e) => setEditingCase({...editingCase, utrNumber: e.target.value})} />
              <Input label="NEFT Date" type="date" value={editingCase.neftDate || ''} onChange={(e) => setEditingCase({...editingCase, neftDate: e.target.value})} />
              <TextArea 
                label="Validation Remarks" 
                value={validationRemark} 
                onChange={(e) => setValidationRemark(e.target.value)}
                placeholder="Enter validation remarks..."
              />
              {editingCase.settledAmount && (
                <div style={{ padding: 12, borderRadius: 8, background: parseFloat(editingCase.settledAmount) < editingCase.insurancePayable ? '#FEE2E2' : '#D1FAE5', color: parseFloat(editingCase.settledAmount) < editingCase.insurancePayable ? '#991B1B' : '#065F46' }}>
                  {parseFloat(editingCase.settledAmount) < editingCase.insurancePayable ? `Short Paid: ${formatCurrency(editingCase.insurancePayable - parseFloat(editingCase.settledAmount))}` : 'Full Settlement'}
                </div>
              )}
            </div>
            <div style={{ display: 'flex', gap: 12, marginTop: 24 }}>
              <Button variant="secondary" fullWidth onClick={() => setEditingCase(null)}>Cancel</Button>
              <Button fullWidth icon="save" onClick={handleSaveEdit}>Save</Button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ==================== ENHANCED CASE DETAIL VIEW ====================
const CaseDetailView = ({ caseData, onBack, onUpdate, userRole, userBranch, corporateRole, currentUser, allCases, onNavigate, onNewCase, onNotify }) => {
  // ALL hooks must be at the top — before any early returns (React rules)
  const [uploadingStage, setUploadingStage] = useState(null);
  const [queryText, setQueryText] = useState('');
  const [validationRemark, setValidationRemark] = useState('');
  const [showValidationPanel, setShowValidationPanel] = useState(false);
  const [podData, setPodData] = useState({
    courierName: caseData?.podDetails?.courierName || '',
    trackingNumber: caseData?.podDetails?.trackingNumber || '',
    dispatchDate: caseData?.podDetails?.dispatchDate || ''
  });

  // Ensure every case has all 4 stages (guard for older/completed cases that may be missing stages)
  const safeStages = {
    preAuth:       { status: 'pending', docs: [], validationRemarks: [], ...caseData?.stages?.preAuth },
    finalBill:     { status: 'pending', docs: [], validationRemarks: [], ...caseData?.stages?.finalBill },
    approval:      { status: 'pending', docs: [], validationRemarks: [], ...caseData?.stages?.approval },
    documentation: { status: 'pending', docs: [], validationRemarks: [], ...caseData?.stages?.documentation },
  };
  const safeCase = caseData ? { ...caseData, stages: safeStages } : null;

  // Safety check — must come AFTER all hooks
  if (!safeCase) {
    return (
      <div className="fade-in">
        <Button variant="secondary" size="sm" onClick={onBack} icon="arrow_left">Back</Button>
        <Card style={{ marginTop: 24, textAlign: 'center', padding: 48 }}>
          <Icon name="alert" size={48} color="var(--danger)"/>
          <h3 style={{ marginTop: 16 }}>Error Loading Case</h3>
          <p>Unable to load case details. Please try again.</p>
        </Card>
      </div>
    );
  }

  // Use safeCase everywhere below instead of caseData
  const caseDataSafe = safeCase;

  // Check permissions based on role
  const canUpload = (stage) => {
    if (userRole !== 'branch' || caseDataSafe.branchCode !== userBranch) return false;
    const stageMap = { preAuth: 1, finalBill: 2, approval: 3, documentation: 4 };
    const currentStageNum = stageMap[caseDataSafe.workflowStatus];
    const targetStageNum = stageMap[stage];
    return targetStageNum === currentStageNum && caseDataSafe.stages[stage]?.status !== 'approved';
  };

  const canReview = (stage) => {
    if (userRole !== 'corporate') return false;
    // Stage 4 (documentation) → only DISPATCH_TEAM or ADMIN
    if (stage === 'documentation') {
      return (corporateRole === 'DISPATCH_TEAM' || corporateRole === 'ADMIN') &&
             caseDataSafe.stages.approval?.status === 'approved' &&
             (caseDataSafe.stages.documentation?.status === 'review' || caseDataSafe.stages.documentation?.status === 'pending');
    }
    // Stages 1–3 → only VALIDATION_TEAM or ADMIN (but not if settled and restricted)
    if (corporateRole === 'VALIDATION_TEAM' || corporateRole === 'ADMIN') {
      if (caseDataSafe.settlementStatus === 'Settled' && corporateRole === 'VALIDATION_TEAM') return false;
      const stageStatus = caseDataSafe.stages[stage]?.status;
      return stageStatus === 'review' || stageStatus === 'query';
    }
    return false;
  };

  // Dispatch team can upload to stage 4 documentation once approval is approved
  const canDispatchUpload = () => {
    if (!caseDataSafe.stages.approval || caseDataSafe.stages.approval.status !== 'approved') return false;
    if (corporateRole === 'DISPATCH_TEAM' || corporateRole === 'ADMIN') return true;
    return false;
  };

  const canManagePOD = () => {
    if (userRole === 'branch' && caseDataSafe.branchCode === userBranch) return true;
    if (corporateRole === 'DISPATCH_TEAM' || corporateRole === 'ADMIN') return true;
    return false;
  };

  const handleUpload = (stage, files) => {
    const updatedCase = { ...caseDataSafe, stages: { ...caseDataSafe.stages } };
    if (!updatedCase.stages[stage]) {
      updatedCase.stages[stage] = { status: 'pending', docs: [], validationRemarks: [] };
    }
    updatedCase.stages[stage].docs = Array.from(files).map(f => f.name);
    updatedCase.stages[stage].status = 'review';
    updatedCase.stages[stage].uploadedAt = new Date().toISOString();
    
    // Add validation remark
    const remark = {
      id: `remark-${Date.now()}`,
      validatorName: currentUser?.name || 'Branch User',
      remark: `Documents uploaded for ${stage}: ${Array.from(files).map(f => f.name).join(', ')}`,
      stage,
      timestamp: new Date().toISOString()
    };
    updatedCase.stages[stage].validationRemarks = [...(updatedCase.stages[stage].validationRemarks || []), remark];
    
    onUpdate(updatedCase);
    setUploadingStage(null);
    
    // Notify corporate that branch uploaded documents
    if (onNotify) {
      onNotify({
        id: `notif-${Date.now()}`,
        type: 'branch_upload',
        target: 'corporate',
        caseId: updatedCase.id,
        patientName: updatedCase.patientName,
        stage,
        message: `📄 Branch uploaded docs for ${stage} — Case ${updatedCase.id} (${updatedCase.patientName})`,
        timestamp: new Date().toISOString(),
        read: false
      });
    }
    if (stage === 'finalBill' && updatedCase.packageType) {
      const validation = AIValidationEngine.validateFBDS(
        { amount: updatedCase.netAmount, billDate: updatedCase.dischargeDate, patientName: updatedCase.patientName },
        { dischargeDate: updatedCase.dischargeDate, patientName: updatedCase.patientName },
        updatedCase.packageType
      );
      
      if (!validation.isValid) {
        updatedCase.stages[stage].status = 'query';
        if (!updatedCase.queries) updatedCase.queries = [];
        updatedCase.queries.push({
          id: `Q${Date.now()}`,
          stage: stage,
          raisedBy: 'system',
          query: `AI Validation Failed: ${validation.discrepancies.join(', ')}`,
          raisedAt: new Date().toISOString(),
          status: 'open'
        });
        onUpdate(updatedCase);
      }
    }
  };

  const handleReview = (stage, action) => {
    const updatedCase = { ...caseDataSafe, stages: { ...caseDataSafe.stages } };
    if (!updatedCase.stages[stage]) {
      updatedCase.stages[stage] = { status: 'pending', docs: [], validationRemarks: [] };
    }
    const validatorName = currentUser?.name || 'Corporate Team';
    
    if (action === 'approve') {
      updatedCase.stages[stage].status = 'approved';
      updatedCase.stages[stage].reviewedAt = new Date().toISOString();
      updatedCase.stages[stage].reviewedBy = validatorName;
      
      // Add validation remark
      const remark = {
        id: `remark-${Date.now()}`,
        validatorName,
        remark: validationRemark || `Stage ${stage} approved`,
        stage,
        timestamp: new Date().toISOString()
      };
      updatedCase.stages[stage].validationRemarks = [...(updatedCase.stages[stage].validationRemarks || []), remark];
      
      const stageFlow = ['preAuth', 'finalBill', 'approval', 'documentation'];
      const currentIndex = stageFlow.indexOf(stage);
      if (currentIndex < stageFlow.length - 1) {
        updatedCase.workflowStatus = stageFlow[currentIndex + 1];
        updatedCase.currentStage = currentIndex + 2;
      }
    } else if (action === 'query') {
      updatedCase.stages[stage].status = 'query';
      if (!updatedCase.queries) updatedCase.queries = [];
      updatedCase.queries.push({ 
        id: `Q${Date.now()}`, 
        stage: stage, 
        raisedBy: validatorName, 
        query: queryText, 
        raisedAt: new Date().toISOString(), 
        status: 'open' 
      });
      
      // Add validation remark for query
      const remark = {
        id: `remark-${Date.now()}`,
        validatorName,
        remark: `Query raised: ${queryText}`,
        stage,
        timestamp: new Date().toISOString()
      };
      updatedCase.stages[stage].validationRemarks = [...(updatedCase.stages[stage].validationRemarks || []), remark];
    }
    
    logActivity(currentUser?.id, 'CASE_REVIEW', { caseId: caseDataSafe.id, stage, action });
    onUpdate(updatedCase);
    setQueryText('');
    setValidationRemark('');

    // Notify branch after corporate action
    if (onNotify) {
      const isApprove = action === 'approve';
      onNotify({
        id: `notif-${Date.now()}`,
        type: isApprove ? 'corporate_approved' : 'corporate_query',
        target: 'branch',
        branchCode: caseDataSafe.branchCode,
        caseId: caseDataSafe.id,
        patientName: caseDataSafe.patientName,
        stage,
        message: isApprove
          ? `✅ Stage ${stage} approved by ${currentUser?.name || 'Corporate'} — Case ${caseDataSafe.id}`
          : `⚠️ Query raised on ${stage} — Case ${caseDataSafe.id}: "${queryText.slice(0,60)}${queryText.length>60?'…':''}"`,
        timestamp: new Date().toISOString(),
        read: false
      });
    }
  };

  const handlePODSubmit = () => {
    const updatedCase = { ...caseDataSafe, stages: { ...caseDataSafe.stages } };
    updatedCase.podDetails = { ...podData, createdAt: new Date().toISOString() };
    updatedCase.stages.documentation = { ...updatedCase.stages.documentation, status: 'completed' };
    updatedCase.settlementStatus = 'Dispatched';
    
    // Add validation remark
    const remark = {
      id: `remark-${Date.now()}`,
      validatorName: currentUser?.name || 'Dispatch Team',
      remark: `POD submitted: ${podData.courierName}, Tracking: ${podData.trackingNumber}`,
      stage: 'documentation',
      timestamp: new Date().toISOString()
    };
    updatedCase.stages.documentation.validationRemarks = [...(updatedCase.stages.documentation.validationRemarks || []), remark];
    
    logActivity(currentUser?.id, 'POD_SUBMIT', { caseId: caseDataSafe.id });
    onUpdate(updatedCase);
  };

  const renderStageCard = (stageKey, stageNum, title, description) => {
    const stage = caseDataSafe.stages[stageKey] || { status: 'pending', docs: [], validationRemarks: [] };
    const isApproved = stage.status === 'approved';
    const isQuery = stage.status === 'query';
    const isReview = stage.status === 'review';

    return (
      <Card style={{ marginBottom: 16, borderLeft: isApproved ? '4px solid var(--accent)' : isQuery ? '4px solid var(--danger)' : isReview ? '4px solid var(--primary)' : '4px solid var(--gray-300)' }}>
        <div style={{ display: 'flex', gap: 16 }}>
          <div style={{ width: 48, height: 48, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: isApproved ? 'var(--accent)' : isQuery ? 'var(--danger)' : isReview ? 'var(--primary)' : 'var(--gray-200)', color: isApproved || isQuery || isReview ? '#fff' : 'var(--gray-500)', fontWeight: 700, fontSize: 18 }}>
            {isApproved ? <Icon name="check" size={24}/> : stageNum}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
              <h3 style={{ fontSize: 18, fontWeight: 700 }}>{title}</h3>
              <span className={`status-${isApproved ? 'approved' : isQuery ? 'query' : isReview ? 'review' : 'pending'}`}>{isApproved ? 'APPROVED' : isQuery ? 'QUERY' : isReview ? 'REVIEW' : 'PENDING'}</span>
              {stage.validationRemarks?.length > 0 && (
                <span className="validation-badge success">
                  <Icon name="clipboard-check" size={10}/> {stage.validationRemarks.length} remarks
                </span>
              )}
            </div>
            <p style={{ color: 'var(--gray-500)', fontSize: 14 }}>{description}</p>
            {stage.docs.length > 0 && (
              <div style={{ marginTop: 8, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {stage.docs.map((doc, i) => (
                  <span key={i} style={{ padding: '4px 12px', background: 'var(--gray-100)', borderRadius: 20, fontSize: 12, display: 'flex', alignItems: 'center', gap: 4 }}>
                    <Icon name="file" size={12}/>
                    {doc}
                  </span>
                ))}
              </div>
            )}
            
            {/* Validation Remarks Timeline */}
            {stage.validationRemarks?.length > 0 && (
              <div style={{ marginTop: 16, padding: 12, background: 'var(--gray-50)', borderRadius: 8 }}>
                <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8, color: 'var(--gray-600)' }}>Validation Remarks:</div>
                <ValidationRemarksTimeline remarks={stage.validationRemarks} />
              </div>
            )}
            
            {canUpload(stageKey) && !isApproved && (
              <div style={{ marginTop: 16 }}>
                <FileUpload
                  label={`Upload ${stageKey === 'finalBill' ? 'Final Bill / Discharge Summary' : stageKey === 'preAuth' ? 'Pre-Auth Documents' : stageKey === 'approval' ? 'Approval Documents' : 'Dispatch Documents'}`}
                  files={[]}
                  onChange={(files) => { if(files.length>0) { const rawFiles = files.map(f=>f.file||f).filter(Boolean); if(rawFiles.length>0) handleUpload(stageKey, rawFiles); } }}
                  documentType={stageKey === 'finalBill' ? 'Final Bill' : stageKey === 'documentation' ? 'Discharge Summary' : stageKey === 'preAuth' ? 'Pre-Auth Form' : 'Document'}
                  showAIValidation={stageKey === 'preAuth' || stageKey === 'finalBill'}
                  caseContext={caseDataSafe}
                  uploadedFiles={stage.docs || []}
                />
              </div>
            )}
            {/* Dispatch team can upload to stage 4 once approval is approved */}
            {stageKey === 'documentation' && canDispatchUpload() && !isApproved && (
              <div style={{ marginTop: 16 }}>
                <div style={{ padding: '10px 14px', background: '#EFF6FF', borderRadius: 10, marginBottom: 12, border: '1px solid #BFDBFE' }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: '#1E40AF' }}>🚚 Dispatch Team — Upload & Validate Documentation</div>
                  <div style={{ fontSize: 11, color: '#3B82F6', marginTop: 3 }}>Upload dispatch documents and enter POD details below</div>
                </div>
                <FileUpload
                  label="Upload Dispatch Documents (POD, Claim Form, Bank Details)"
                  files={[]}
                  onChange={(files) => { if(files.length>0) { const rawFiles = files.map(f=>f.file||f).filter(Boolean); if(rawFiles.length>0) handleUpload(stageKey, rawFiles); } }}
                  documentType="Dispatch Document"
                  showAIValidation={false}
                  caseContext={caseDataSafe}
                  uploadedFiles={stage.docs || []}
                />
              </div>
            )}
            {canReview(stageKey) && (
              <div style={{ marginTop: 16, padding: 16, background: 'var(--gray-50)', borderRadius: 12 }}>
                <TextArea 
                  label="Validation Remarks" 
                  value={validationRemark} 
                  onChange={(e) => setValidationRemark(e.target.value)}
                  placeholder="Add validation remarks..."
                  rows={2}
                />
                <textarea placeholder="Add query comments (if rejecting)..." value={queryText} onChange={(e) => setQueryText(e.target.value)} style={{ width: '100%', border: '1px solid var(--gray-200)', borderRadius: 8, padding: 8, marginTop: 8 }} />
                <div style={{ display: 'flex', gap: 12, marginTop: 12 }}>
                  <Button variant="success" size="sm" onClick={() => handleReview(stageKey, 'approve')}>Approve</Button>
                  <Button variant="danger" size="sm" onClick={() => handleReview(stageKey, 'query')}>Raise Query</Button>
                </div>
              </div>
            )}
          </div>
        </div>
      </Card>
    );
  };

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24, flexWrap: 'wrap' }}>
        <Button variant="secondary" size="sm" onClick={onBack} icon="arrow_left">Back</Button>
        <h2 style={{ fontSize: 24, fontWeight: 700 }}>{caseDataSafe.id}</h2>
        {caseDataSafe.packageType && (
          <span className="validation-badge pending">
            {INSURANCE_PACKAGES[caseDataSafe.packageType]?.name}
          </span>
        )}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
          {userRole === 'branch' && onNewCase && (
            <Button variant="secondary" size="sm" icon="plus" onClick={onNewCase}>New Case</Button>
          )}
          {onNavigate && (
            <Button variant="secondary" size="sm" icon="alert" onClick={() => onNavigate('queries')}>
              Queries {caseDataSafe.queries?.filter(q=>q.status==='open').length > 0 && (
                <span style={{ background: 'var(--danger)', color: '#fff', borderRadius: '50%', width: 18, height: 18, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, marginLeft: 4 }}>
                  {caseDataSafe.queries.filter(q=>q.status==='open').length}
                </span>
              )}
            </Button>
          )}
        </div>
      </div>

      {/* Anomaly Alerts */}
      {caseDataSafe.anomalies && caseDataSafe.anomalies.length > 0 && (
        <DiscrepancyAlert 
          discrepancies={caseDataSafe.anomalies.map(a => a.message)}
          onRaiseQuery={() => {
            const updatedCase = { ...caseData };
            updatedCase.queries.push({
              id: `Q${Date.now()}`,
              stage: 'preAuth',
              raisedBy: 'system',
              query: `Anomaly detected: ${caseDataSafe.anomalies.map(a => a.message).join(', ')}`,
              raisedAt: new Date().toISOString(),
              status: 'open'
            });
            onUpdate(updatedCase);
          }}
        />
      )}

      <Card style={{ marginBottom: 24, background: 'linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%)', color: '#fff' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
          <div>
            <h2 style={{ fontSize: 28, fontWeight: 700 }}>{caseDataSafe.patientName}</h2>
            <div style={{ opacity: 0.9, fontSize: 14 }}>{caseDataSafe.uhid} | {caseDataSafe.location} | {caseDataSafe.reason}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 13, opacity: 0.8 }}>Insurance Payable</div>
            <div style={{ fontSize: 24, fontWeight: 700 }}>{formatCurrency(caseDataSafe.insurancePayable)}</div>
            {caseDataSafe.settledDate && <DocumentDeletionCountdown settlementDate={caseDataSafe.settledDate} />}
          </div>
        </div>
      </Card>

      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 24 }}>
        <div>
          {renderStageCard('preAuth', 1, 'Stage 1: Pre-Authorization', 'Upload pre-authorization documents')}
          {renderStageCard('finalBill', 2, 'Stage 2: Final Bill & DS', 'Upload final bill and discharge summary')}
          {renderStageCard('approval', 3, 'Stage 3: Insurance Approval', 'Upload approval letter')}
          {renderStageCard('documentation', 4, 'Stage 4: Documentation', 'Upload documents and enter POD')}

          {/* FB/DS Validation Panel */}
          {caseDataSafe.fbValidation && (
            <Card style={{ marginBottom: 16 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 8 }}>
                <Icon name="shield-check" size={18} color="var(--accent)"/>
                FB/DS Validation Results
              </h3>
              <AIValidationPanel validation={caseDataSafe.fbValidation} onClose={() => {}} />
            </Card>
          )}

          {/* Historical Data Comparison */}

          {caseDataSafe.stages.approval.status === 'approved' && canManagePOD() && (
            <Card>
              <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>POD Details</h3>
              {!caseDataSafe.podDetails ? (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                  <Input label="Courier" value={podData.courierName} onChange={(e) => setPodData({...podData, courierName: e.target.value})} />
                  <Input label="Tracking" value={podData.trackingNumber} onChange={(e) => setPodData({...podData, trackingNumber: e.target.value})} />
                  <Input label="Date" type="date" value={podData.dispatchDate} onChange={(e) => setPodData({...podData, dispatchDate: e.target.value})} />
                  <div style={{ display: 'flex', alignItems: 'flex-end' }}><Button onClick={handlePODSubmit}>Save POD</Button></div>
                </div>
              ) : (
                <div style={{ padding: 16, background: 'var(--gray-50)', borderRadius: 12 }}>
                  <div>Courier: {caseDataSafe.podDetails.courierName}</div>
                  <div>Tracking: {caseDataSafe.podDetails.trackingNumber}</div>
                  <div>Date: {formatDate(caseDataSafe.podDetails.dispatchDate)}</div>
                </div>
              )}
            </Card>
          )}
        </div>

        <div>
          <Card style={{ marginBottom: 16 }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 16, color: 'var(--gray-600)' }}>CASE INFO</h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {/* IP Number — editable in stages 1,2,3 */}
              <div>
                <div style={{ fontSize: 12, color: 'var(--gray-400)', marginBottom: 4 }}>IP Number</div>
                {caseDataSafe.workflowStatus !== 'documentation' ? (
                  <input
                    defaultValue={caseDataSafe.ipNumber || ''}
                    onBlur={(e) => {
                      if (e.target.value !== (caseDataSafe.ipNumber || '')) {
                        onUpdate({ ...caseDataSafe, ipNumber: e.target.value });
                      }
                    }}
                    placeholder="Enter IP / Admission No."
                    style={{ width: '100%', padding: '6px 10px', border: '1.5px solid var(--gray-200)', borderRadius: 8, fontSize: 13, fontWeight: 600, outline: 'none', transition: 'border-color 0.2s', background: '#fff' }}
                    onFocus={e => e.target.style.borderColor = 'var(--primary)'}
                    onBlurCapture={e => e.target.style.borderColor = 'var(--gray-200)'}
                  />
                ) : (
                  <div style={{ fontWeight: 600 }}>{caseDataSafe.ipNumber || <span style={{ color: 'var(--gray-300)' }}>—</span>}</div>
                )}
              </div>
              <div><div style={{ fontSize: 12, color: 'var(--gray-400)' }}>Branch</div><div style={{ fontWeight: 600 }}>{caseDataSafe.location}</div></div>
              <div><div style={{ fontSize: 12, color: 'var(--gray-400)' }}>Insurance</div><div style={{ fontWeight: 600 }}>{caseDataSafe.insuranceCompany}</div></div>
              <div><div style={{ fontSize: 12, color: 'var(--gray-400)' }}>TPA</div><div style={{ fontWeight: 600 }}>{caseDataSafe.tpaName}</div></div>
              <div><div style={{ fontSize: 12, color: 'var(--gray-400)' }}>Policy</div><div style={{ fontWeight: 600 }}>{caseDataSafe.policyNumber}</div></div>
              {caseDataSafe.utrNumber && <div><div style={{ fontSize: 12, color: 'var(--gray-400)' }}>UTR</div><div style={{ fontWeight: 600, color: 'var(--accent)' }}>{caseDataSafe.utrNumber}</div></div>}
            </div>
          </Card>

          {/* Queries Panel */}
          {caseDataSafe.queries && caseDataSafe.queries.length > 0 && (
            <Card>
              <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 16, color: 'var(--gray-600)' }}>QUERIES</h3>
              {caseDataSafe.queries.map((query, i) => (
                <div key={i} className={`query-card ${query.status === 'resolved' ? 'resolved' : ''}`} style={{ marginBottom: 8 }}>
                  <div style={{ fontSize: 12, color: 'var(--gray-500)', marginBottom: 4 }}>{query.raisedBy} • {formatDate(query.raisedAt)}</div>
                  <div style={{ fontSize: 13 }}>{query.query}</div>
                  <div style={{ marginTop: 4 }}>
                    <span className={`status-${query.status}`}>{query.status.toUpperCase()}</span>
                  </div>
                </div>
              ))}
            </Card>
          )}
        </div>
      </div>
    </div>
  );
};

        updatedAt: new Date().toISOString()
      };
      
      cases.push(caseData);
      caseId++;
    }
  });
  
  return cases;
};

const INITIAL_CASES = generateCases();

// ==================== STAGE 4 DIRECT CASE FORM ====================
const Stage4CaseForm = ({ corporateRole, cases, onBack, onSave, branches }) => {
  const [formData, setFormData] = useState({
    patientName: '', ipNumber: '', mobile: '', admissionDate: '', dischargeDate: '',
    grossAmount: '', discount: '', insuranceCompany: '', tpaName: '', policyNumber: '',
    reason: '', doctorName: '', department: '', billNumber: '', branchCode: ''
  });
  const hi = v => setFormData(p => ({...p, ...v}));

  const handleSave = () => {
    if (!formData.patientName || !formData.branchCode || !formData.ipNumber) {
      alert('Patient Name, IP Number and Branch are required');
      return;
    }
    const branch = BRANCHES.find(b => b.id === formData.branchCode);
    const net = parseFloat(formData.grossAmount||0) - parseFloat(formData.discount||0);
    const newCase = {
      id: `CNH-2024-${(cases.length + 1).toString().padStart(3,'0')}`,
      uhid: `CNH-${branch?.code||'XX'}-${Math.floor(100000 + Math.random()*900000)}`,
      ...formData,
      netAmount: net,
      patientPayable: 0,
      insurancePayable: Math.floor(net * 0.8),
      location: branch?.name || formData.branchCode,
      fy: '2024-25',
      packageType: 'Default',
      currentStage: 4,
      workflowStatus: 'documentation',
      stages: {
        preAuth:       { status: 'approved', docs: [], uploadedAt: null, reviewedAt: new Date().toISOString(), reviewedBy: 'Corporate (Stage 4 Entry)', comments: 'Direct Stage 4 entry — stages 1-3 skipped', validationRemarks: [] },
        finalBill:     { status: 'approved', docs: [], uploadedAt: null, reviewedAt: new Date().toISOString(), reviewedBy: 'Corporate (Stage 4 Entry)', comments: 'Direct Stage 4 entry', validationRemarks: [] },
        approval:      { status: 'approved', docs: [], uploadedAt: null, reviewedAt: new Date().toISOString(), reviewedBy: 'Corporate (Stage 4 Entry)', comments: 'Direct Stage 4 entry', validationRemarks: [] },
        documentation: { status: 'pending', docs: [], uploadedAt: null, reviewedAt: null, reviewedBy: null, comments: null, validationRemarks: [] }
      },
      queries: [],
      podDetails: null, settledAmount: null, utrNumber: null, neftDate: null,
      settlementStatus: 'Pending', anomalies: [], validationRemarks: [],
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
      directStage4Entry: true
    };
    onSave(newCase);
  };

  return (
    <div className="fade-in">
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
        <Button variant="secondary" size="sm" onClick={onBack} icon="arrow_left">Back</Button>
        <h2 style={{ fontSize:24, fontWeight:700 }}>Create Case — Stage 4 Direct Entry</h2>
      </div>
      <div style={{ padding:'10px 16px', background:'#FEF3C7', borderRadius:10, marginBottom:20, border:'1px solid #FDE68A', display:'flex', gap:10, alignItems:'center' }}>
        <Icon name="alert" size={16} color="#92400E"/>
        <span style={{ fontSize:13, color:'#92400E', fontWeight:600 }}>Stages 1–3 will be auto-approved. This case will enter directly at Stage 4 (Documentation) and branch can upload documents.</span>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        <Card>
          <h3 style={{ fontSize:15, fontWeight:700, marginBottom:16 }}>Patient Details</h3>
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <Input label="Patient Name *" value={formData.patientName} onChange={e=>hi({patientName:e.target.value})}/>
            <Input label="IP Number *" value={formData.ipNumber} onChange={e=>hi({ipNumber:e.target.value})} placeholder="Inpatient admission number"/>
            <Input label="Mobile" value={formData.mobile} onChange={e=>hi({mobile:e.target.value})}/>
            <Input label="Admission Date" type="date" value={formData.admissionDate} onChange={e=>hi({admissionDate:e.target.value})}/>
            <Input label="Discharge Date" type="date" value={formData.dischargeDate} onChange={e=>hi({dischargeDate:e.target.value})}/>
            <Input label="Bill Number" value={formData.billNumber} onChange={e=>hi({billNumber:e.target.value})}/>
            <TextArea label="Reason" value={formData.reason} onChange={e=>hi({reason:e.target.value})} rows={2}/>
          </div>
        </Card>
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          <Card>
            <h3 style={{ fontSize:15, fontWeight:700, marginBottom:16 }}>Branch & Insurance</h3>
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                <label style={{ fontSize:12, fontWeight:700, color:'var(--gray-600)' }}>Branch *</label>
                <select value={formData.branchCode} onChange={e=>hi({branchCode:e.target.value})}
                  style={{ width:'100%', border:'1.5px solid var(--gray-200)', borderRadius:10, padding:'11px 14px', fontSize:13.5, fontFamily:'DM Sans', outline:'none', height:44, backgroundColor:'#fff' }}>
                  <option value="">Select branch</option>
                  {BRANCHES.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
              </div>
              <SelectField label="Insurance Company" value={formData.insuranceCompany} onChange={e=>hi({insuranceCompany:e.target.value})}
                options={INSURANCE_COMPANIES} placeholder="Select insurance"/>
              <SelectField label="TPA" value={formData.tpaName} onChange={e=>hi({tpaName:e.target.value})}
                options={TPA_LIST} placeholder="Select TPA"/>
              <Input label="Policy Number" value={formData.policyNumber} onChange={e=>hi({policyNumber:e.target.value})}/>
            </div>
          </Card>
          <Card>
            <h3 style={{ fontSize:15, fontWeight:700, marginBottom:16 }}>Billing</h3>
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              <Input label="Gross Amount" type="number" value={formData.grossAmount} onChange={e=>hi({grossAmount:e.target.value})}/>
              <Input label="Discount" type="number" value={formData.discount} onChange={e=>hi({discount:e.target.value})}/>
              {formData.grossAmount && (
                <div style={{ padding:'10px 14px', background:'var(--gray-50)', borderRadius:8, fontSize:13 }}>
                  <div style={{ display:'flex', justifyContent:'space-between' }}><span>Net Amount:</span><b>{formatCurrency(parseFloat(formData.grossAmount||0)-parseFloat(formData.discount||0))}</b></div>
                  <div style={{ display:'flex', justifyContent:'space-between', marginTop:6 }}><span>Est. Ins. Payable:</span><b style={{color:'var(--primary)'}}>{formatCurrency(Math.floor((parseFloat(formData.grossAmount||0)-parseFloat(formData.discount||0))*0.8))}</b></div>
                </div>
              )}
            </div>
          </Card>
          <div style={{ display:'flex', gap:12 }}>
            <Button variant="secondary" fullWidth onClick={onBack}>Cancel</Button>
            <Button fullWidth icon="save" onClick={handleSave}>Create Stage 4 Case</Button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ==================== BULK EXCEL UPLOAD ====================
const BulkUploadView = ({ cases, onBulkCreate, onBack, onUpdateCases }) => {
  const [step, setStep] = useState('upload'); // upload | preview | done
  const [matchResults, setMatchResults] = useState([]);
  const [processing, setProcessing] = useState(false);
  const [error, setError] = useState('');
  const [created, setCreated] = useState(0);
  const [skippedCount, setSkippedCount] = useState(0);
  const [enrichedCount, setEnrichedCount] = useState(0);
  const [fileName, setFileName] = useState('');
  const fileRef = React.useRef();

  // ─── Map one row from the Cloudnine IP Bills Report to an internal record ───
  const mapRow = (row) => {
    const g  = (...keys) => { for (const k of keys) { const v = row[k]; if (v !== undefined && String(v).trim() !== '') return String(v).trim(); } return ''; };
    const gn = (...keys) => { const v = parseFloat(g(...keys)); return isNaN(v) ? 0 : v; };

    // Strip leading apostrophe that CSV adds to MPI numbers
    const mpi = g('MPI').replace(/^'+/, '');

    const gross    = gn('Gross');          // Net of pharmacy returns & GST base
    const discount = gn('Discount');
    const net      = gn('Net');            // Final net after GST + discount + rounding
    const approved = gn('Approved Amount');
    const amountDue = gn('Amount Due');
    // Insurance payable = Approved Amount if set, else Amount Due, else 80% estimate
    const insurancePayable = approved > 0 ? approved : amountDue > 0 ? amountDue : Math.floor(net * 0.8);

    // Branch fuzzy match — try to match Cloudnine branch name against registered branches
    const branchRaw = g('Branch');
    const bl = branchRaw.toLowerCase();
    const branch = BRANCHES.find(b => {
      const nl = b.name.toLowerCase();
      // Try: branch name contains last word of registered name or vice versa
      const words = nl.replace('bangalore ','').split(/[\s(]+/).filter(w => w.length > 3);
      return words.some(w => bl.includes(w)) || nl.includes(bl.replace('cloudnine ','').split(' ')[0]);
    }) || null;

    return {
      // Source identifiers
      ipNumber:          g('IP #'),
      billNumber:        g('Bill #'),
      slNo:              g('Sl #'),
      mpi,
      // Patient
      patientName:       g('Patient Name'),
      age:               g('Age'),
      gender:            g('Gender'),
      // Clinical
      doctorName:        g('Admitting Physician'),
      department:        g('Specialisation'),
      admitGroup:        g('Admit Group'),
      admissionPurpose:  g('Admission Purpose'),
      reason:            [g('Admit Group'), g('Admission Purpose')].filter(Boolean).join(' — '),
      // Dates
      admissionDate:     g('Admission Date'),
      admissionTime:     g('Admission Time'),
      dischargeDate:     g('Discharge Date'),
      dischargeTime:     g('Discharge Time'),
      los:               g('LOS(In Days)'),
      // Room
      ward:              g('Ward'),
      room:              g('Room'),
      bed:               g('Bed'),
      bedCategory:       g('Bed Category'),
      // Billing
      pharmacyTotal:     gn('Pharmacy Total'),
      total:             gn('Total'),
      pharmacyReturn:    gn('Pharmacy Return'),
      grossAmount:       gross,
      gst:               gn('GST'),
      discount,
      rounding:          gn('Rounding'),
      net,
      advancePaid:       gn('Advance Adjusted'),
      netAfterAdvance:   gn('Net After Advance'),
      cash:              gn('Cash'),
      card:              gn('Card'),
      amountDue,
      // Insurance
      insurancePayable,
      approvedAmount:    approved,
      authCode:          g('Auth Code'),
      insuranceCompany:  g('Insurance'),
      tpaName:           g('TPA'),
      corporateName:     g('Corporate Name'),
      category:          g('Category'),
      isAnywhereCashless:g('Is Anywhere Cashless'),
      // Package
      packageName:       g('Package Name'),
      packageAmount:     gn('Package Amount'),
      discountedPackage: gn('Discounted Package Amount'),
      // Branch
      branchRaw,
      branchCode:        branch?.id   || null,
      branchName:        branch?.name || branchRaw,
      branchMatched:     !!branch,
      // User
      user:              g('User'),
    };
  };

  // ─── Parse the uploaded file (CSV or XLSX) ───
  const parseFile = (file) => {
    setError('');
    setFileName(file.name);
    const isCsv = file.name.toLowerCase().endsWith('.csv');

    const processRows = (rows) => {
      if (rows.length === 0) { setError('File is empty — no data rows found.'); return; }
      // Must have at least Patient Name + IP #
      const first = rows[0];
      if (!('Patient Name' in first)) { setError('Column "Patient Name" not found. Please upload the Cloudnine IP Bills Report export.'); return; }
      if (!('IP #' in first) && !('IP Number' in first)) { setError('Column "IP #" not found. Please upload the Cloudnine IP Bills Report (Customer Level IP Bills Report).'); return; }

      const parsed = rows.map(r => mapRow(r));

      // Match each row against existing cases by IP Number
      const results = parsed.map((p, idx) => {
        const ipStr = String(p.ipNumber).trim();
        const existing = ipStr
          ? cases.find(c => c.ipNumber && String(c.ipNumber).trim() === ipStr)
          : null;

        // Detect which fields are missing from existing case but present in the report
        let enrichFields = [];
        if (existing) {
          if (!existing.billNumber && p.billNumber) enrichFields.push('billNumber');
          if ((!existing.uhid || existing.uhid.startsWith('CNH-CNH')) && p.mpi) enrichFields.push('mpi');
          if (!existing.doctorName && p.doctorName) enrichFields.push('doctorName');
          if (!existing.department && p.department) enrichFields.push('department');
          if (!existing.authCode && p.authCode) enrichFields.push('authCode');
          if (!existing.approvedAmount && p.approvedAmount) enrichFields.push('approvedAmount');
        }

        return {
          ...p,
          rowIdx:        idx,
          existingCase:  existing || null,
          action:        existing ? 'skip' : 'create',
          selected:      !existing,
          enrichFields,
          enrichSelected: enrichFields.length > 0,
        };
      });

      setMatchResults(results);
      setStep('preview');
    };

    const reader = new FileReader();
    if (isCsv) {
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'string' });
          processRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' }));
        } catch(err) { setError('CSV parse failed: ' + err.message); }
      };
      reader.readAsText(file);
    } else {
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          processRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' }));
        } catch(err) { setError('Excel parse failed: ' + err.message); }
      };
      reader.readAsArrayBuffer(file);
    }
  };

  const toggleSelect      = (idx) => setMatchResults(prev => prev.map((r,i) => i === idx ? { ...r, selected: !r.selected } : r));
  const toggleEnrich      = (idx) => setMatchResults(prev => prev.map((r,i) => i === idx ? { ...r, enrichSelected: !r.enrichSelected } : r));
  const selectAll         = ()    => setMatchResults(prev => prev.map(r => r.action === 'create' ? { ...r, selected: true  } : r));
  const deselectAll       = ()    => setMatchResults(prev => prev.map(r => r.action === 'create' ? { ...r, selected: false } : r));
  const selectAllEnrich   = ()    => setMatchResults(prev => prev.map(r => r.action === 'skip' && r.enrichFields.length > 0 ? { ...r, enrichSelected: true  } : r));
  const deselectAllEnrich = ()    => setMatchResults(prev => prev.map(r => r.action === 'skip' ? { ...r, enrichSelected: false } : r));

  // ─── Create case objects and call parent ───
  const handleImport = () => {
    setProcessing(true);
    const toCreate = matchResults.filter(r => r.selected && r.action === 'create');
    // Enrich existing cases with missing data from bill report
    const toEnrich = matchResults.filter(r => r.action === 'skip' && r.enrichSelected && r.enrichFields.length > 0);
    const now = new Date().toISOString();
    const d   = new Date();
    const fy  = d.getMonth() >= 3
      ? `${d.getFullYear()}-${String(d.getFullYear() + 1).slice(2)}`
      : `${d.getFullYear() - 1}-${String(d.getFullYear()).slice(2)}`;

    const newCases = toCreate.map((r, i) => {
      const branch = BRANCHES.find(b => b.id === r.branchCode) || BRANCHES[0];
      return {
        id:               `CNH-${d.getFullYear()}-${(cases.length + i + 1).toString().padStart(3, '0')}`,
        uhid:             r.mpi ? `CNH-${r.mpi.slice(-8)}` : `CNH-${branch.code}-${Math.floor(100000 + Math.random() * 900000)}`,
        // Core fields mapped from report
        ipNumber:         r.ipNumber,
        billNumber:       r.billNumber,
        patientName:      r.patientName,
        age:              r.age,
        gender:           r.gender,
        mobile:           '',
        doctorName:       r.doctorName,
        department:       r.department,
        reason:           r.reason,
        admissionDate:    r.admissionDate,
        dischargeDate:    r.dischargeDate,
        los:              r.los,
        ward:             r.ward,
        room:             r.room,
        bedCategory:      r.bedCategory,
        // Billing — all from report, no estimation
        grossAmount:      r.grossAmount,
        gst:              r.gst,
        discount:         r.discount,
        netAmount:        r.net,
        advancePaid:      r.advancePaid,
        patientPayable:   r.amountDue,
        insurancePayable: r.insurancePayable,
        approvedAmount:   r.approvedAmount,
        authCode:         r.authCode,
        // Insurance
        insuranceCompany: r.insuranceCompany,
        tpaName:          r.tpaName,
        corporateName:    r.corporateName,
        policyNumber:     '',
        // Package
        packageName:      r.packageName,
        packageAmount:    r.packageAmount,
        packageType:      'Default',
        // Branch
        location:         r.branchName,
        branchCode:       r.branchCode || branch.id,
        fy,
        // Workflow — all stages 1-3 auto-approved, case starts at Stage 4
        currentStage:     4,
        workflowStatus:   'documentation',
        settlementStatus: 'Pending',
        stages: {
          preAuth: {
            status: 'approved', docs: [], uploadedAt: null,
            reviewedAt: now, reviewedBy: 'Corporate — IP Bills Import',
            comments: `Auto-created from IP Bills Report (${fileName}). Auth Code: ${r.authCode || 'N/A'}`,
            validationRemarks: []
          },
          finalBill: {
            status: 'approved', docs: [], uploadedAt: null,
            reviewedAt: now, reviewedBy: 'Corporate — IP Bills Import',
            comments: `Gross: ₹${r.grossAmount.toLocaleString()} | Net: ₹${r.net.toLocaleString()} | Discount: ₹${r.discount.toLocaleString()}`,
            validationRemarks: []
          },
          approval: {
            status: 'approved', docs: [], uploadedAt: null,
            reviewedAt: now, reviewedBy: 'Corporate — IP Bills Import',
            comments: `Approved Amt: ₹${r.approvedAmount.toLocaleString()} | Insurance: ${r.insuranceCompany}`,
            validationRemarks: []
          },
          documentation: {
            status: 'pending', docs: [], uploadedAt: null,
            reviewedAt: null, reviewedBy: null, comments: null, validationRemarks: []
          },
        },
        queries:           [],
        podDetails:        null,
        settledAmount:     null,
        utrNumber:         null,
        neftDate:          null,
        anomalies:         [],
        validationRemarks: [],
        createdAt:         now,
        updatedAt:         now,
        directStage4Entry: true,
        bulkImported:      true,
        sourceFile:        fileName,
      };
    });

    // Apply enrichment to existing cases that have missing data
    if (toEnrich.length > 0 && onUpdateCases) {
      const enrichedCases = cases.map(c => {
        const match = toEnrich.find(r => r.existingCase && r.existingCase.id === c.id);
        if (!match) return c;
        const updates = {};
        if (match.enrichFields.includes('billNumber')) updates.billNumber = match.billNumber;
        if (match.enrichFields.includes('mpi')) {
          updates.mpi = match.mpi;
          updates.uhid = match.mpi ? `CNH-${match.mpi.slice(-8)}` : c.uhid;
        }
        if (match.enrichFields.includes('doctorName')) updates.doctorName = match.doctorName;
        if (match.enrichFields.includes('department')) updates.department = match.department;
        if (match.enrichFields.includes('authCode')) updates.authCode = match.authCode;
        if (match.enrichFields.includes('approvedAmount')) updates.approvedAmount = match.approvedAmount;
        updates.billReportEnrichedAt = now;
        updates.billReportSourceFile = fileName;
        return { ...c, ...updates };
      });
      onUpdateCases(enrichedCases);
    }

    onBulkCreate(newCases);
    setCreated(newCases.length);
    setSkippedCount(matchResults.filter(r => r.action === 'skip').length);
    setEnrichedCount(toEnrich.length);
    setStep('done');
    setProcessing(false);
  };

  // ─── Download template that matches the real report columns ───
  const downloadTemplate = () => {
    const headers = [
      'Sl #','MPI','IP #','Bill #','Bill Date','Bill Time','Patient Name','Age','Gender',
      'Admitting Physician','Specialisation','Admit Group','Admission Purpose',
      'Admission Date','Admission Time','Discharge Date','Discharge Time','LOS(In Days)',
      'Ward','Room','Bed','Bed Category','Bill Type','Pharmacy Total','Total',
      'Pharmacy Return','Gross','GST','Discount','Rounding','Net','Advance Adjusted',
      'Net After Advance','Cash','Card','CHQ','Amount Due','Package Name','Package Amount',
      'Category','TPA','Insurance','Corporate Name','Auth Code','Approved Amount','User',
      'LL Cash','LL Cash Comments','Is Anywhere Cashless','Discounted Package Amount','Branch'
    ];
    const sample = [
      '1','1000000102555936','5069','IPD/KAC/26CR75','27-02-2026','6:44 PM',
      'Priya Sharma','28','Female','Dr. Ananya Nair','OBSTETRICS & GYNECOLOGY',
      'C Section Delivery','Elective LSCS','24-02-2026','8:00 AM','27-02-2026','11:00 AM',
      '3','Second Floor','204','204','Luxury','CREDIT','30000','140000','5000',
      '135000','2000','5000','-0.5','132000','80000','52000','','','','52000',
      'C-Section Delivery - Star Health - 2025','118000','Insurance/TPA',
      'Medi Assist Insurance TPA Pvt. Ltd','Star Health Insurance','',
      'AUTH123456','52000','Admin User','','','No','118000',
      'Cloudnine Kailash Colony (South Delhi)'
    ];
    const ws = XLSX.utils.aoa_to_sheet([headers, sample]);
    ws['!cols'] = headers.map(h => ({ wch: Math.max(h.length + 2, 14) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'IP Bills Report');
    XLSX.writeFile(wb, 'Cloudnine_IP_Bills_Report_Template.xlsx');
  };

  // ════════════════════ DONE SCREEN ════════════════════
  if (step === 'done') return (
    <div className="fade-in">
      <Card style={{ textAlign: 'center', padding: 60, maxWidth: 540, margin: '48px auto' }}>
        <div style={{ width: 84, height: 84, borderRadius: '50%', background: 'linear-gradient(135deg,#D1FAE5,#A7F3D0)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px', boxShadow: '0 8px 32px rgba(16,185,129,0.18)' }}>
          <Icon name="check-circle" size={42} color="#059669"/>
        </div>
        <h2 style={{ fontSize: 26, fontWeight: 700, marginBottom: 6 }}>Import Complete!</h2>
        <p style={{ fontSize: 13, color: 'var(--gray-500)', marginBottom: 24 }}>From: <b>{fileName}</b></p>
        <div style={{ display: 'flex', gap: 24, justifyContent: 'center', margin: '0 0 28px' }}>
          <div>
            <div style={{ fontSize: 36, fontWeight: 700, color: 'var(--accent)' }}>{created}</div>
            <div style={{ fontSize: 12, color: 'var(--gray-500)', marginTop: 2 }}>Cases Created</div>
            <div style={{ fontSize: 11, color: 'var(--gray-400)' }}>Waiting for branch docs</div>
          </div>
          <div style={{ width: 1, background: 'var(--gray-200)' }}/>
          <div>
            <div style={{ fontSize: 36, fontWeight: 700, color: '#F59E0B' }}>{skippedCount}</div>
            <div style={{ fontSize: 12, color: 'var(--gray-500)', marginTop: 2 }}>Already Existed</div>
            <div style={{ fontSize: 11, color: 'var(--gray-400)' }}>IP # matched</div>
          </div>
          {enrichedCount > 0 && <><div style={{ width: 1, background: 'var(--gray-200)' }}/>
          <div>
            <div style={{ fontSize: 36, fontWeight: 700, color: '#6B4EE6' }}>{enrichedCount}</div>
            <div style={{ fontSize: 12, color: 'var(--gray-500)', marginTop: 2 }}>Cases Enriched</div>
            <div style={{ fontSize: 11, color: 'var(--gray-400)' }}>Bill #, MPI, Doctor updated</div>
          </div></>}
        </div>
        <div style={{ padding: '12px 16px', background: '#EFF6FF', borderRadius: 10, marginBottom: 12, fontSize: 13, color: '#1E40AF', border: '1px solid #BFDBFE' }}>
          🏥 New cases are now at <b>Stage 4 (Documentation)</b>. Branch staff can see them in their queue and upload documents immediately.
        </div>
        {enrichedCount > 0 && <div style={{ padding: '12px 16px', background: '#EDE9FE', borderRadius: 10, marginBottom: 24, fontSize: 13, color: '#4C1D95', border: '1px solid #DDD6FE' }}>
          ✏️ <b>{enrichedCount} existing case{enrichedCount !== 1 ? 's' : ''}</b> were updated with missing Bill #, MPI and Doctor data from the report.
        </div>}
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
          <Button variant="secondary" onClick={onBack}>Back to Cases</Button>
          <Button onClick={() => { setMatchResults([]); setFileName(''); setError(''); setStep('upload'); }}>
            Upload Another File
          </Button>
        </div>
      </Card>
    </div>
  );

  // ════════════════════ PREVIEW SCREEN ════════════════════
  if (step === 'preview') {
    const newCount        = matchResults.filter(r => r.action === 'create').length;
    const existingCount   = matchResults.filter(r => r.action === 'skip').length;
    const selectedCount   = matchResults.filter(r => r.selected && r.action === 'create').length;
    const enrichableCount = matchResults.filter(r => r.action === 'skip' && r.enrichFields && r.enrichFields.length > 0).length;
    const enrichSelectedCount = matchResults.filter(r => r.action === 'skip' && r.enrichSelected && r.enrichFields && r.enrichFields.length > 0).length;
    const unmatchedBr     = [...new Set(matchResults.filter(r => r.action === 'create' && !r.branchMatched).map(r => r.branchRaw))];

    return (
      <div className="fade-in">
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
          <Button variant="secondary" size="sm" onClick={() => setStep('upload')} icon="arrow_left">Re-upload</Button>
          <div>
            <h2 style={{ fontSize: 22, fontWeight: 700 }}>Review Import</h2>
            <div style={{ fontSize: 12, color: 'var(--gray-500)', marginTop: 2 }}>
              Source: <b>{fileName}</b> &nbsp;·&nbsp; {matchResults.length} rows parsed
            </div>
          </div>
        </div>

        {/* Summary cards */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 14, marginBottom: 20 }}>
          {[
            { label: 'TOTAL ROWS',      val: matchResults.length, color: '#6B4EE6', sub: 'In uploaded file' },
            { label: 'NEW — MISSING',   val: newCount,            color: '#10B981', sub: 'Not found in system' },
            { label: 'ALREADY EXIST',   val: existingCount,       color: '#F59E0B', sub: `${enrichableCount} can be enriched` },
            { label: 'WILL IMPORT',     val: selectedCount,       color: '#1B4F8A', sub: 'Selected below' },
          ].map(b => (
            <Card key={b.label} style={{ borderLeft: `4px solid ${b.color}`, padding: '14px 18px' }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--gray-400)', letterSpacing: '0.05em', marginBottom: 6 }}>{b.label}</div>
              <div style={{ fontSize: 30, fontWeight: 700, color: b.color, lineHeight: 1 }}>{b.val}</div>
              <div style={{ fontSize: 11, color: 'var(--gray-400)', marginTop: 5 }}>{b.sub}</div>
            </Card>
          ))}
        </div>

        {/* Enrichment info panel */}
        {enrichableCount > 0 && (
          <div style={{ padding: '12px 16px', background: '#EDE9FE', borderRadius: 10, marginBottom: 16, border: '1px solid #DDD6FE', fontSize: 13, color: '#4C1D95' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div><b>✏️ {enrichableCount} existing case{enrichableCount !== 1 ? 's' : ''}</b> have missing data (Bill #, MPI, Doctor) that can be filled from this report — <b>{enrichSelectedCount} selected to enrich</b>.</div>
              <div style={{ display:'flex', gap:8, flexShrink:0, marginLeft:12 }}>
                <button onClick={selectAllEnrich}   style={{ padding:'4px 10px', fontSize:11, fontWeight:600, background:'#DDD6FE', color:'#4C1D95', border:'1px solid #C4B5FD', borderRadius:6, cursor:'pointer' }}>Enrich All</button>
                <button onClick={deselectAllEnrich} style={{ padding:'4px 10px', fontSize:11, fontWeight:600, background:'var(--gray-100)', color:'var(--gray-500)', border:'1px solid var(--gray-200)', borderRadius:6, cursor:'pointer' }}>Skip All</button>
              </div>
            </div>
          </div>
        )}

        {/* Branch mismatch warning */}
        {unmatchedBr.length > 0 && (
          <div style={{ padding: '10px 16px', background: '#FEF3C7', borderRadius: 10, marginBottom: 16, border: '1px solid #FDE68A', fontSize: 13, color: '#92400E', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
            <Icon name="alert" size={16} color="#92400E"/>
            <div><b>{unmatchedBr.length} unrecognised branch name{unmatchedBr.length > 1 ? 's' : ''}:</b> {unmatchedBr.join(', ')}. These rows will be assigned to the first registered branch — please verify after import.</div>
          </div>
        )}

        {/* Table */}
        <Card style={{ marginBottom: 16, padding: 0 }}>
          {/* Toolbar */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '11px 16px', borderBottom: '1px solid var(--gray-100)', background: 'var(--gray-50)', borderRadius: '12px 12px 0 0' }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--gray-700)' }}>
              {selectedCount} of {newCount} new case{newCount !== 1 ? 's' : ''} selected
            </span>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
              <button onClick={selectAll}   style={{ padding: '5px 12px', fontSize: 11, fontWeight: 600, background: '#D1FAE5', color: '#065F46', border: '1px solid #A7F3D0', borderRadius: 7, cursor: 'pointer' }}>Select All New</button>
              <button onClick={deselectAll} style={{ padding: '5px 12px', fontSize: 11, fontWeight: 600, background: 'var(--gray-100)', color: 'var(--gray-500)', border: '1px solid var(--gray-200)', borderRadius: 7, cursor: 'pointer' }}>Deselect All</button>
            </div>
          </div>

          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
              <thead>
                <tr style={{ background: '#1A1A2E', color: '#fff' }}>
                  {['', 'IP #', 'Bill #', 'Patient', 'Age / Sex', 'Doctor / Dept', 'Branch', 'Insurance / TPA', 'Admit', 'Discharge', 'Net Amt', 'Approved', 'Auth Code', 'Status'].map(h => (
                    <th key={h} style={{ padding: '10px 11px', fontWeight: 600, fontSize: 10, textAlign: 'left', whiteSpace: 'nowrap', letterSpacing: 0.3 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {matchResults.map((r, i) => {
                  const bg = r.action === 'skip' ? '#FFFBEB' : r.selected ? '#F0FDF4' : '#fff';
                  return (
                    <tr key={i} style={{ background: bg, borderBottom: '1px solid #f0f0f0' }}
                      onMouseEnter={e => e.currentTarget.style.background = r.action === 'skip' ? '#FFF8E1' : r.selected ? '#ECFDF5' : '#FAFAFA'}
                      onMouseLeave={e => e.currentTarget.style.background = bg}
                    >
                      {/* Checkbox */}
                      <td style={{ padding: '9px 12px', textAlign: 'center', width: 36 }}>
                        {r.action === 'create'
                          ? <input type="checkbox" checked={r.selected} onChange={() => toggleSelect(i)}
                              style={{ width: 15, height: 15, cursor: 'pointer', accentColor: '#10B981' }}/>
                          : r.enrichFields && r.enrichFields.length > 0
                            ? <input type="checkbox" checked={r.enrichSelected} onChange={() => toggleEnrich(i)}
                                title={`Enrich ${r.existingCase?.id}: ${r.enrichFields.join(', ')}`}
                                style={{ width: 15, height: 15, cursor: 'pointer', accentColor: '#6B4EE6' }}/>
                            : <span title={`Already exists as ${r.existingCase?.id} — no missing fields`} style={{ fontSize: 15 }}>✅</span>
                        }
                      </td>
                      {/* IP # */}
                      <td style={{ padding: '9px 11px', fontFamily: 'monospace', fontWeight: 700, color: 'var(--primary)', fontSize: 12, whiteSpace: 'nowrap' }}>{r.ipNumber || '—'}</td>
                      {/* Bill # */}
                      <td style={{ padding: '9px 11px', fontSize: 11, color: 'var(--gray-500)', whiteSpace: 'nowrap' }}>{r.billNumber || '—'}</td>
                      {/* Patient */}
                      <td style={{ padding: '9px 11px', fontWeight: 600, whiteSpace: 'nowrap' }}>{r.patientName || '—'}</td>
                      {/* Age / Gender */}
                      <td style={{ padding: '9px 11px', fontSize: 11, color: 'var(--gray-500)', whiteSpace: 'nowrap' }}>{r.age ? `${r.age}y` : ''}{r.gender ? ` ${r.gender[0]}` : ''}</td>
                      {/* Doctor / Dept */}
                      <td style={{ padding: '9px 11px', fontSize: 11 }}>
                        <div style={{ fontWeight: 500 }}>{r.doctorName || '—'}</div>
                        {r.department && <div style={{ fontSize: 10, color: 'var(--gray-400)', marginTop: 1 }}>{r.department}</div>}
                      </td>
                      {/* Branch */}
                      <td style={{ padding: '9px 11px', fontSize: 11 }}>
                        <div style={{ fontWeight: r.branchMatched ? 600 : 400, color: r.branchMatched ? 'var(--text)' : '#D97706' }}>{r.branchName || '—'}</div>
                        {!r.branchMatched && r.action === 'create' && <div style={{ fontSize: 10, color: '#D97706' }}>⚠ unmatched</div>}
                      </td>
                      {/* Insurance / TPA */}
                      <td style={{ padding: '9px 11px', fontSize: 11, maxWidth: 160 }}>
                        <div style={{ fontWeight: 500 }}>{r.insuranceCompany || '—'}</div>
                        {r.tpaName && <div style={{ fontSize: 10, color: 'var(--gray-400)', marginTop: 1 }}>{r.tpaName}</div>}
                      </td>
                      {/* Dates */}
                      <td style={{ padding: '9px 11px', fontSize: 11, whiteSpace: 'nowrap' }}>{r.admissionDate || '—'}</td>
                      <td style={{ padding: '9px 11px', fontSize: 11, whiteSpace: 'nowrap' }}>{r.dischargeDate || '—'}</td>
                      {/* Net */}
                      <td style={{ padding: '9px 11px', fontFamily: 'monospace', fontWeight: 600, fontSize: 12, whiteSpace: 'nowrap' }}>{r.net > 0 ? formatCurrency(r.net) : formatCurrency(r.grossAmount)}</td>
                      {/* Approved */}
                      <td style={{ padding: '9px 11px', fontFamily: 'monospace', fontWeight: 600, fontSize: 12, color: 'var(--accent)', whiteSpace: 'nowrap' }}>{r.approvedAmount > 0 ? formatCurrency(r.approvedAmount) : '—'}</td>
                      {/* Auth Code */}
                      <td style={{ padding: '9px 11px', fontSize: 11, color: 'var(--gray-500)', fontFamily: 'monospace', whiteSpace: 'nowrap' }}>{r.authCode || '—'}</td>
                      {/* Status badge */}
                      <td style={{ padding: '9px 11px', whiteSpace: 'nowrap' }}>
                        {r.action === 'skip'
                          ? r.enrichFields && r.enrichFields.length > 0
                            ? r.enrichSelected
                              ? <div>
                                  <span style={{ padding: '3px 8px', background: '#EDE9FE', color: '#4C1D95', borderRadius: 10, fontSize: 10, fontWeight: 700, display:'block', marginBottom:3 }}>✏️ ENRICH</span>
                                  <span style={{ fontSize: 10, color:'#6B4EE6' }}>{r.enrichFields.join(', ')}</span>
                                </div>
                              : <div>
                                  <span style={{ padding: '3px 8px', background: '#FEF3C7', color: '#92400E', borderRadius: 10, fontSize: 10, fontWeight: 700, display:'block', marginBottom:3 }}>EXISTS</span>
                                  <span style={{ fontSize: 10, color:'#D97706' }}>skip enrich</span>
                                </div>
                            : <span style={{ padding: '3px 8px', background: '#FEF3C7', color: '#92400E', borderRadius: 10, fontSize: 10, fontWeight: 700 }}>EXISTS — {r.existingCase?.id}</span>
                          : r.selected
                            ? <span style={{ padding: '3px 8px', background: '#D1FAE5', color: '#065F46', borderRadius: 10, fontSize: 10, fontWeight: 700 }}>✓ CREATE</span>
                            : <span style={{ padding: '3px 8px', background: 'var(--gray-100)', color: 'var(--gray-500)', borderRadius: 10, fontSize: 10, fontWeight: 700 }}>SKIP</span>
                        }
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>

        {/* Footer actions */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, justifyContent: 'flex-end' }}>
          <span style={{ fontSize: 13, color: 'var(--gray-500)' }}>
            {selectedCount === 0 && enrichSelectedCount === 0
              ? 'No cases selected'
              : `${selectedCount > 0 ? `${selectedCount} new` : ''}${selectedCount > 0 && enrichSelectedCount > 0 ? ' + ' : ''}${enrichSelectedCount > 0 ? `${enrichSelectedCount} enrich` : ''}`}
          </span>
          <Button variant="secondary" onClick={() => setStep('upload')}>Re-upload</Button>
          <Button onClick={handleImport} disabled={selectedCount === 0 && enrichSelectedCount === 0 || processing} icon="save" style={{ minWidth: 200 }}>
            {processing ? 'Importing...' : `Import${selectedCount > 0 ? ` ${selectedCount} New` : ''}${enrichSelectedCount > 0 ? ` + Enrich ${enrichSelectedCount}` : ''}`}
          </Button>
        </div>
      </div>
    );
  }

  // ════════════════════ UPLOAD SCREEN ════════════════════
  return (
    <div className="fade-in">
      {/* Page header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
        <Button variant="secondary" size="sm" onClick={onBack} icon="arrow_left">Back</Button>
        <div>
          <h2 style={{ fontSize: 24, fontWeight: 700 }}>Bulk Upload — IP Bills Report</h2>
          <p style={{ fontSize: 13, color: 'var(--gray-500)', marginTop: 2 }}>Upload the standard Cloudnine "Customer Level IP Bills Report" directly — no reformatting needed</p>
        </div>
      </div>

      {/* Info cards */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 20 }}>
        <Card style={{ borderLeft: '4px solid var(--primary)' }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>📋 How it works</h3>
          <div style={{ fontSize: 13, color: 'var(--gray-600)', lineHeight: 1.85 }}>
            <div><b>1.</b> Export <em>Customer Level IP Bills Report</em> from your billing system</div>
            <div><b>2.</b> Upload the CSV or Excel file here — no changes needed</div>
            <div><b>3.</b> System reads all rows and matches by <b>IP #</b></div>
            <div><b>4.</b> Cases already in the system are flagged and skipped</div>
            <div><b>5.</b> Missing cases are created directly at <b>Stage 4</b></div>
            <div><b>6.</b> Branch staff see them instantly and can upload documents</div>
          </div>
        </Card>

        <Card style={{ borderLeft: '4px solid var(--accent)' }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>🗂 Auto-mapped columns</h3>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px 16px', fontSize: 12, marginBottom: 14 }}>
            {[
              ['IP #',               'IP Number'],
              ['Bill #',             'Bill Number'],
              ['MPI',                'UHID / Patient ID'],
              ['Patient Name',       'Patient Name'],
              ['Admitting Physician','Doctor'],
              ['Specialisation',     'Department'],
              ['Admit Group',        'Reason'],
              ['Admission Date',     'Admit Date'],
              ['Discharge Date',     'Discharge Date'],
              ['Gross',              'Gross Amount'],
              ['Net',                'Net Amount'],
              ['Discount',           'Discount'],
              ['Approved Amount',    'Insurance Payable'],
              ['Auth Code',          'Auth Code'],
              ['Insurance',          'Insurance Company'],
              ['TPA',                'TPA Name'],
              ['Package Name',       'Package'],
              ['Branch',             'Branch (fuzzy)'],
            ].map(([src, dest]) => (
              <div key={src} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <code style={{ background: '#EFF6FF', color: 'var(--primary)', padding: '1px 5px', borderRadius: 4, fontSize: 11, fontFamily: 'monospace', flexShrink: 0 }}>{src}</code>
                <span style={{ color: 'var(--gray-400)', fontSize: 10 }}>→ {dest}</span>
              </div>
            ))}
          </div>
          <Button variant="secondary" size="sm" icon="download" onClick={downloadTemplate}>Download Sample Template</Button>
        </Card>
      </div>

      {/* Error banner */}
      {error && (
        <div style={{ padding: '12px 16px', background: '#FEE2E2', borderRadius: 10, marginBottom: 16, border: '1px solid #FECACA', fontSize: 13, color: '#991B1B', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
          <Icon name="alert" size={16} color="#991B1B"/>
          <div><b>Error:</b> {error}</div>
        </div>
      )}

      {/* Drop zone */}
      <Card>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>Upload IP Bills Report</h3>
        <p style={{ fontSize: 12, color: 'var(--gray-400)', marginBottom: 18 }}>Accepts the raw export — CSV, XLSX, or XLS</p>
        <div
          onClick={() => fileRef.current?.click()}
          onDragOver={e  => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--primary)'; e.currentTarget.style.background = 'rgba(27,79,138,0.03)'; }}
          onDragLeave={e => { e.currentTarget.style.borderColor = 'var(--gray-300)'; e.currentTarget.style.background = 'transparent'; }}
          onDrop={e      => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--gray-300)'; e.currentTarget.style.background = 'transparent'; const f = e.dataTransfer.files[0]; if (f) parseFile(f); }}
          style={{ border: '2px dashed var(--gray-300)', borderRadius: 14, padding: '56px 32px', textAlign: 'center', cursor: 'pointer', transition: 'all 0.2s' }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--primary)'; e.currentTarget.style.background = 'rgba(27,79,138,0.02)'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--gray-300)'; e.currentTarget.style.background = 'transparent'; }}
        >
          <div style={{ width: 68, height: 68, background: 'linear-gradient(135deg, #EFF6FF, #DBEAFE)', borderRadius: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 18px', boxShadow: '0 4px 16px rgba(27,79,138,0.1)' }}>
            <Icon name="upload" size={30} color="var(--primary)"/>
          </div>
          <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--gray-700)', marginBottom: 6 }}>Drag & drop the IP Bills Report here</div>
          <div style={{ fontSize: 13, color: 'var(--gray-400)', marginBottom: 22 }}>CSV, XLSX, or XLS — direct export from billing system, no changes needed</div>
          <Button size="sm">Browse File</Button>
        </div>
        <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" style={{ display: 'none' }}
          onChange={e => { const f = e.target.files[0]; if (f) parseFile(f); e.target.value = ''; }}/>
      </Card>
    </div>
  );
};


// ==================== MAIN APP COMPONENT ====================

// ==================== CASES LIST VIEW COMPONENT ====================
const CasesListView = ({ cases, userRole, userBranch, corporateRole, onSelectCase, onNewCase }) => {
  const [caseSearch, setCaseSearch] = React.useState('');
  const stageMap2 = { preAuth:'Pre-Auth', finalBill:'Final Bill', approval:'Approval', documentation:'Documentation' };
