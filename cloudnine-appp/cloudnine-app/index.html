const mimeType = (file) => {
  const e = file.name.split('.').pop().toLowerCase();
  return ({ pdf:'application/pdf', jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png', webp:'image/webp' })[e] || 'application/pdf';
};

const parseJSON = (text) => {
  const m = text.match(/{[\s\S]*}/);
  if (m) { try { return JSON.parse(m[0]); } catch(e) {} }
  return { summary: text, checks: [], discrepancies: [], recommendations: [], isValid: true, confidence: 0.8 };
};

const callClaude = async (file, systemPrompt, userPrompt) => {
  const b64  = await toBase64(file);
  const mime = mimeType(file);
  const isPDF = mime === 'application/pdf';
  const docBlock = isPDF
    ? { type: 'document', source: { type: 'base64', media_type: mime, data: b64 } }
    : { type: 'image',    source: { type: 'base64', media_type: mime, data: b64 } };

  const res = await fetch(CLAUDE_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': getApiKey(), 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 1500,
      system: systemPrompt,
      messages: [{ role: 'user', content: [docBlock, { type: 'text', text: userPrompt }] }]
    })
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${res.status}`);
  }
  const d = await res.json();
  return parseJSON(d.content?.map(b => b.text || '').join('') || '{}');
};

// ── DISPATCH: route to correct validator ─────────────────────────────────
const AIValidationEngine = {
  analyzeDocument: async (file, docType, ctx = {}) => {
    const dt = (docType || '').toLowerCase();
    if (dt.includes('final bill') || dt.includes('invoice') || dt.includes('final-bill'))
      return await validateFinalBill(file, ctx);
    if (dt.includes('discharge') || dt.includes('discharge summary'))
      return await validateDischargeSummary(file, ctx);
    if (dt.includes('pre-auth') || dt.includes('pre auth') || dt.includes('preauth'))
      return await validatePreAuth(file, docType, ctx);
    return await validateGenericDoc(file, docType, ctx);
  },

  // Keep for legacy calls
  detectAnomalies: (caseData, allCases) => {
    const anomalies = [];
    const dupes = allCases.filter(c =>
      c.patientName === caseData.patientName && c.id !== caseData.id &&
      Math.abs(new Date(c.admissionDate) - new Date(caseData.admissionDate)) < 30*24*60*60*1000
    );
    if (dupes.length > 0)
      anomalies.push({ type:'duplicate_claim', severity:'high', message:`Possible duplicate: ${dupes.map(c=>c.id).join(', ')}` });
    const bCases = allCases.filter(c => c.branchCode === caseData.branchCode);
    const avg = bCases.reduce((s,c)=>s+(c.netAmount||0),0) / Math.max(bCases.length,1);
    if (caseData.netAmount > avg*2 && avg>0)
      anomalies.push({ type:'high_amount', severity:'medium', message:`Bill is ${(caseData.netAmount/avg).toFixed(1)}x branch average` });
    return anomalies;
  }
};

// ==================== DOCUMENT LIFECYCLE MANAGER ====================
const DocumentLifecycleManager = {
  scheduleDeletion: (caseId, settlementDate) => {
    const deletionDate = new Date(new Date(settlementDate).getTime() + 40 * 24 * 60 * 60 * 1000);
    return {
      caseId,
      settlementDate,
      deletionDate,
      daysRemaining: Math.ceil((deletionDate - new Date()) / (24 * 60 * 60 * 1000))
    };
  },

  checkAndDelete: (cases) => {
    const now = new Date();
    return cases.map(c => {
      if (c.settlementStatus === 'Settled' && c.settledDate) {
        const daysSinceSettlement = Math.floor((now - new Date(c.settledDate)) / (24 * 60 * 60 * 1000));
        if (daysSinceSettlement >= 40) {
          return { ...c, documentsDeleted: true, documentsDeletedAt: now.toISOString() };
        }
      }
      return c;
    });
  }
};

// ==================== HELPER FUNCTIONS ====================
const formatCurrency = (amount) => {
  if (!amount && amount !== 0) return '-';
  return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(amount);
};

const formatDate = (dateStr) => {
  if (!dateStr) return '-';
  return new Date(dateStr).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
};

const calculateAging = (dischargeDate) => {
  if (!dischargeDate) return 0;
  const discharge = new Date(dischargeDate);
  const today = new Date();
  return Math.ceil(Math.abs(today - discharge) / (1000 * 60 * 60 * 24));
};

const getAgingBucket = (days) => {
  if (days <= 15) return '0-15 Days';
  if (days <= 30) return '16-30 Days';
  if (days <= 45) return '31-45 Days';
  if (days <= 60) return '46-60 Days';
  return '60+ Days';
};

// ==================== XLSX SAFE EXPORT ====================
const exportCSV = (data, filename) => {
  if (typeof XLSX !== 'undefined') {
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, 'Data');
    XLSX.writeFile(wb, filename.replace('.xlsx','.xlsx'));
  } else {
    const headers = Object.keys(data[0] || {});
    const rows = data.map(r => headers.map(h => `"${(r[h]||'').toString().replace(/"/g,'""')}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = filename.replace('.xlsx','.csv'); a.click();
  }
};

  const iW=W-PL-PR, iH=H-PT-PB;
  const allV=data.flatMap(d=>bars.map(b=>d[b.key]||0));
  const maxV=Math.max(...allV,1);
  const gW=iW/Math.max(data.length,1);
  const bW=(gW*0.7)/Math.max(bars.length,1);
  return (
    <div style={{width:'100%',overflowX:'auto'}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',overflow:'visible'}}>
        {[0,.25,.5,.75,1].map((_,i)=>{
          const y=PT+(iH/4)*i; const val=maxV-(maxV/4)*i;
          return <g key={i}><line x1={PL} y1={y} x2={PL+iW} y2={y} stroke="#E2E6F0" strokeWidth={1}/><text x={PL-6} y={y+4} textAnchor="end" fontSize={9} fill="#97A3B6">{formatY(Math.round(val))}</text></g>;

            {bars.map((b,bi)=>{
              const bh=Math.max(2,(d[b.key]||0)/maxV*iH);
              const bx=gx+bi*bW; const by=PT+iH-bh;
              const COLS=['#6B4EE6','#FF6B9D','#00D4AA','#FFB800','#3498DB'];
              return <g key={bi}>
                <rect x={bx} y={by} width={Math.max(bW-2,3)} height={bh} fill={b.color||COLS[bi%5]} rx={3}
                  onMouseEnter={()=>setTip({x:bx+bW/2,y:by,label:d[xKey],key:b.name,val:d[b.key]})}
                  onMouseLeave={()=>setTip(null)} style={{cursor:'pointer',transition:'opacity .15s'}}
                  onMouseOver={e=>e.target.style.opacity='.75'} onMouseOut={e=>e.target.style.opacity='1'}/>
              </g>;
            })}
            <text x={gx+(gW*0.7)/2} y={PT+iH+16} textAnchor="middle" fontSize={9} fill="#677489">

const SVGDonut = ({ data, height=220 }) => {
  const [hov,setHov]=React.useState(null);
  const cx=110,cy=height/2,R=Math.min(height/2-14,80),iR=R*0.54;
  const total=data.reduce((a,d)=>a+d.value,0)||1;
  let ang=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const a=(d.value/total)*2*Math.PI; const sa=ang; ang+=a; const ea=ang;
    const x1=cx+R*Math.cos(sa),y1=cy+R*Math.sin(sa),x2=cx+R*Math.cos(ea),y2=cy+R*Math.sin(ea);
    const ix1=cx+iR*Math.cos(sa),iy1=cy+iR*Math.sin(sa),ix2=cx+iR*Math.cos(ea),iy2=cy+iR*Math.sin(ea);
    const lg=a>Math.PI?1:0;
    const path=`M ${ix1} ${iy1} L ${x1} ${y1} A ${R} ${R} 0 ${lg} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${iR} ${iR} 0 ${lg} 0 ${ix1} ${iy1} Z`;
    return {...d,path,midAngle:sa+a/2,i};
  });
  const COLS=['#6B4EE6','#FF6B9D','#00D4AA','#FFB800','#3498DB','#FF4757','#2ECC71'];
  return (
    <div style={{width:'100%'}}>
      <svg viewBox={`0 0 ${cx*2+180} ${height}`} style={{width:'100%',height:'auto',overflow:'visible'}}>
        {slices.map((s,i)=>(
          <path key={i} d={s.path} fill={s.color||COLS[i%7]} stroke="#fff" strokeWidth={2}
            transform={hov===i?`translate(${Math.cos(s.midAngle)*5},${Math.sin(s.midAngle)*5})`:''}
            onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)} style={{cursor:'pointer',transition:'transform .15s'}}/>
        ))}
        <text x={cx} y={cy-6} textAnchor="middle" fontSize={20} fontWeight="700" fill="#1A1A2E">{data.reduce((a,d)=>a+d.value,0)}</text>
        <text x={cx} y={cy+13} textAnchor="middle" fontSize={10} fill="#677489">total</text>
        {data.map((d,i)=>(
          <g key={i} transform={`translate(${cx*2+10},${height/2-data.length*16+i*32})`}>
            <rect width={12} height={12} rx={3} fill={d.color||COLS[i%7]}/>
            <text x={17} y={10} fontSize={11} fill="#1A1A2E" fontWeight="600">{d.name}</text>
            <text x={17} y={22} fontSize={10} fill="#677489">{d.value} ({((d.value/total)*100).toFixed(0)}%)</text>
          </g>
        ))}
      </svg>
    </div>
  );
};

  React.useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const handleSearch = (val) => {
    setQuery(val);
    if (!val.trim()) { setResults([]); setOpen(false); return; }
    const q = val.toLowerCase();

      (c.id && c.id.toLowerCase().includes(q)) ||
      (c.patientName && c.patientName.toLowerCase().includes(q)) ||

      (c.mobile && c.mobile.includes(q))
    ).slice(0, 12);
    setResults(found);
    setOpen(true);

  const stageColors = { preAuth:'#6B4EE6', finalBill:'#FF6B9D', approval:'#FFB800', documentation:'#00D4AA' };
  const stageLabels = { preAuth:'Pre-Auth', finalBill:'Final Bill', approval:'Approval', documentation:'Documentation' };
  const statusColors = { Settled:'#D1FAE5', 'Short Paid':'#FEE2E2', Dispatched:'#DBEAFE', Pending:'#FEF3C7' };
  const statusText = { Settled:'#065F46', 'Short Paid':'#991B1B', Dispatched:'#1E40AF', Pending:'#92400E' };

  return (
    <div ref={ref} style={{ position:'relative', width: compact ? 280 : '100%', maxWidth: compact ? 280 : 520 }}>
      <div style={{ position:'relative' }}>
        <div style={{ position:'absolute', left:14, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}>
          <Icon name="search" size={16} color="var(--gray-400)"/>
        </div>
        <input
          value={query}
          onChange={e => handleSearch(e.target.value)}
          onFocus={() => results.length > 0 && setOpen(true)}
          placeholder={placeholder}
          style={{ width:'100%', paddingLeft:40, paddingRight:36, height:42, border:'2px solid var(--gray-200)', borderRadius:12, fontSize:13, fontFamily:'Inter', outline:'none', boxSizing:'border-box', transition:'border-color .2s' }}
          onMouseOver={e=>e.target.style.borderColor='var(--primary)'}
          onMouseOut={e=>{ if(document.activeElement!==e.target) e.target.style.borderColor='var(--gray-200)'; }}
          onFocusCapture={e=>e.target.style.borderColor='var(--primary)'}
          onBlurCapture={e=>e.target.style.borderColor='var(--gray-200)'}
        />
        {query && (
          <button onClick={()=>{setQuery('');setResults([]);setOpen(false);}} style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'var(--gray-400)', fontSize:16, lineHeight:1 }}>×</button>
        )}
      </div>
      {open && results.length > 0 && (
        <div style={{ position:'absolute', top:48, left:0, right:0, background:'#fff', border:'1.5px solid var(--gray-200)', borderRadius:14, boxShadow:'0 8px 32px rgba(0,0,0,0.12)', zIndex:1000, maxHeight:420, overflowY:'auto' }}>
          <div style={{ padding:'8px 14px', fontSize:11, fontWeight:700, color:'var(--gray-400)', borderBottom:'1px solid var(--gray-100)', letterSpacing:.5 }}>
            {results.length} RESULT{results.length !== 1 ? 'S' : ''} FOUND
          </div>
          {results.map((c, i) => (
            <div key={c.id} onClick={() => { onSelectCase(c); setQuery(''); setResults([]); setOpen(false); }}
              style={{ padding:'12px 14px', cursor:'pointer', borderBottom: i < results.length-1 ? '1px solid var(--gray-50)' : 'none', display:'flex', alignItems:'center', gap:12, transition:'background .15s' }}
              onMouseOver={e=>e.currentTarget.style.background='var(--gray-50)'}
              onMouseOut={e=>e.currentTarget.style.background='#fff'}
            >
              <div style={{ width:36, height:36, borderRadius:10, background:`${stageColors[c.workflowStatus]}18`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <Icon name="file" size={16} color={stageColors[c.workflowStatus] || '#6B4EE6'}/>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:2 }}>
                  <span style={{ fontWeight:700, fontSize:13, color:'var(--primary)' }}>{c.id}</span>
                  <span style={{ fontSize:11, padding:'2px 8px', borderRadius:10, background: statusColors[c.settlementStatus] || '#F3F4F6', color: statusText[c.settlementStatus] || '#374151', fontWeight:600 }}>
                    {c.settlementStatus || 'Pending'}
                  </span>
                </div>
                <div style={{ fontSize:13, fontWeight:600, color:'#1A1A2E', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{c.patientName}</div>
                <div style={{ fontSize:11, color:'var(--gray-400)', display:'flex', gap:10, marginTop:2 }}>
                  <span>{c.location?.replace('Bangalore ','')||'-'}</span>
                  <span>·</span>
                  <span>{c.insuranceCompany||'-'}</span>
                  <span>·</span>
                  <span style={{ color: stageColors[c.workflowStatus], fontWeight:600 }}>{stageLabels[c.workflowStatus] || c.workflowStatus}</span>
                </div>
              </div>
              <div style={{ textAlign:'right', flexShrink:0 }}>
                <div style={{ fontSize:12, fontWeight:700, color:'var(--gray-700)' }}>{formatCurrency(c.insurancePayable)}</div>
                <div style={{ fontSize:10, color:'var(--gray-400)' }}>payable</div>
              </div>
            </div>
          ))}
        </div>
      )}
      {open && results.length === 0 && query.trim() && (
        <div style={{ position:'absolute', top:48, left:0, right:0, background:'#fff', border:'1.5px solid var(--gray-200)', borderRadius:14, boxShadow:'0 8px 32px rgba(0,0,0,0.12)', zIndex:1000, padding:24, textAlign:'center' }}>
          <Icon name="search" size={28} color="var(--gray-300)"/>
          <div style={{ fontSize:13, color:'var(--gray-400)', marginTop:8 }}>No cases found for "<strong>{query}</strong>"</div>
          <div style={{ fontSize:11, color:'var(--gray-300)', marginTop:4 }}>Try Case ID, patient name or mobile</div>
        </div>
      )}
    </div>
  );
};

const Toast = ({ message, type = 'info', onClose }) => {
  useEffect(() => {
    const timer = setTimeout(onClose, 3000);
    return () => clearTimeout(timer);
  }, [onClose]);

  const colors = {
    info: 'var(--dark)',
    success: 'var(--accent)',
    error: 'var(--danger)',
    warning: 'var(--warning)'
  };

  return (
    <div className="toast" style={{ background: colors[type] }}>
      {message}
    </div>
  );
};

// ==================== AI-POWERED FILE UPLOAD ====================
const FileUpload = ({ label, files: filesProp, onChange, required=false, uploadedFiles=[], documentType, caseContext={}, showAIValidation=false }) => {
  const [dragging, setDragging]   = useState(false);
  // Self-managed file list so AI results persist regardless of parent re-renders
  const [localFiles, setLocalFiles] = useState([]);
  const [results,    setResults]   = useState({});  // fileId -> {state, data, error}
  const [globalErr,  setGlobalErr] = useState('');  // top-level error banner
  const fileRef = useRef(null);

  // Use localFiles as source of truth; sync to parent via onChange
  const files = localFiles;

  const process = async (rawFiles) => {
    if (!rawFiles || rawFiles.length === 0) return;
    const newFiles = Array.from(rawFiles).map(f => ({
      file: f,
      id: `f${Date.now()}${Math.random().toString(36).slice(2,6)}`,
      name: f.name,
      size: f.size
    }));

    // Update local state immediately so files appear right away
    setLocalFiles(prev => {
      const updated = [...prev, ...newFiles];
      // Notify parent
      if (onChange) onChange(updated);
      return updated;
    });
    setGlobalErr('');

    if (!showAIValidation) return;

    // Check API key before calling
    if (!getApiKey()) {
      setGlobalErr('⚠ No API key configured — document saved. Enter your Anthropic API key at login to enable AI validation.');
      return;
    }

    // Validate each file with Claude
    for (const fo of newFiles) {
      setResults(p => ({ ...p, [fo.id]: { state: 'loading' } }));
      try {
        const data = await AIValidationEngine.analyzeDocument(fo.file, documentType || label, caseContext);
        const state = !data
                    ? 'err'
                    : (data.status === 'rejected' || data.isValid === false)
                    ? 'fail'
                    : (data.status === 'needs_review')
                    ? 'warn'
                    : 'ok';
        setResults(p => ({ ...p, [fo.id]: { state, data } }));
      } catch(err) {
        console.error('AI validation error:', err);
        const isAuth = /401|403|authentication|api.key|invalid.x-api/i.test(err.message);
        const isCors = /fetch|network|cors|failed/i.test(err.message);
        let msg = err.message;
        if (isAuth) msg = 'Invalid API key — go to Settings and re-enter your Anthropic API key';
        else if (isCors) msg = 'Network error — check internet connection';
        setResults(p => ({ ...p, [fo.id]: { state: 'err', error: msg, isAuth } }));
        setGlobalErr(isAuth
          ? '⚠ API key invalid or expired. Document saved — please re-enter your key.'
          : `⚠ AI validation failed: ${msg}. Document saved for manual review.`
        );
      }
    }
  };

  const remove = (i) => {
    const removed = localFiles[i];
    setLocalFiles(prev => {
      const updated = prev.filter((_, j) => j !== i);
      if (onChange) onChange(updated);
      return updated;
    });
    if (removed?.id) setResults(p => { const n={...p}; delete n[removed.id]; return n; });
  };

  const stateStyle = { ok:['#10B981','#F0FDF4','#86EFAC'], warn:['#D97706','#FFFBEB','#FCD34D'], fail:['#DC2626','#FEF2F2','#FCA5A5'] };

  return (
    <div style={{marginBottom:16}}>
      <label style={{fontSize:13,fontWeight:600,color:'var(--gray-700)',display:'block',marginBottom:6}}>
        {label}{required && <span style={{color:'var(--danger)'}}> *</span>}
        {showAIValidation && (
          <span style={{marginLeft:8,padding:'2px 9px',background:'linear-gradient(135deg,#6B4EE6,#FF6B9D)',color:'#fff',borderRadius:20,fontSize:10,fontWeight:700,letterSpacing:.3}}>
            ✦ AI ANALYSIS
          </span>
        )}
      </label>

      {/* Drop zone */}
      <div
        onClick={()=>fileRef.current?.click()}
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);process(e.dataTransfer.files);}}
        style={{
          border:`2px dashed ${dragging?'var(--primary)':'var(--gray-200)'}`,
          borderRadius:12, padding:'20px 16px', textAlign:'center', cursor:'pointer',
          background: dragging?'rgba(107,78,230,0.04)':'#FAFAFA', transition:'all .2s'
        }}>
        <input ref={fileRef} type="file" multiple style={{display:'none'}}
          accept=".pdf,.jpg,.jpeg,.png"
          onChange={e=>process(e.target.files)}/>
        <div style={{fontSize:28}}>📎</div>
        <div style={{marginTop:6,fontWeight:600,fontSize:13,color:'#1A1A2E'}}>Click or drag & drop files here</div>
        <div style={{fontSize:11,color:'var(--gray-400)',marginTop:2}}>PDF, JPG, PNG — max 10 MB</div>
        {/* Show how many files are being analysed */}
        {showAIValidation && Object.values(results).some(r=>r.state==='loading') && (
          <div style={{marginTop:8,fontSize:12,color:'#6B4EE6',fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
            <span className="spinner" style={{width:12,height:12,borderWidth:2,borderColor:'rgba(107,78,230,0.2)',borderTopColor:'#6B4EE6'}}/>
            Claude AI is reading your document...
          </div>
        )}
        {showAIValidation && getApiKey() && !Object.values(results).some(r=>r.state==='loading') && (
          <div style={{marginTop:8,fontSize:11,color:'#6B4EE6',fontWeight:500}}>
            ✦ Claude AI will read &amp; validate each document instantly
          </div>
        )}
        {showAIValidation && !getApiKey() && (
          <div style={{marginTop:8,fontSize:11,color:'#D97706',fontWeight:500,display:'flex',alignItems:'center',gap:4}}>
            <span>⚠</span> AI disabled — <span style={{textDecoration:'underline',cursor:'pointer'}} onClick={()=>alert('Sign out and sign back in to enter your Anthropic API key on the setup screen.')}>add API key to enable</span>
          </div>
        )}
      </div>

      {/* Already-uploaded files from DB */}
      {uploadedFiles.length > 0 && (
        <div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:6}}>
          {uploadedFiles.map((f,i)=>(
            <span key={i} style={{padding:'4px 10px',background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:20,fontSize:11,color:'#065F46',display:'flex',alignItems:'center',gap:4}}>
              ✓ {f}
            </span>
          ))}
        </div>
      )}

      {/* Global error banner */}
      {globalErr && (
        <div style={{ marginTop:8, padding:'8px 12px', background:'#FEF3C7', border:'1px solid #FCD34D', borderRadius:10, fontSize:12, color:'#92400E', display:'flex', gap:8, alignItems:'flex-start' }}>
          <span style={{ flexShrink:0, fontSize:14 }}>⚠</span>
          <div style={{ flex:1 }}>{globalErr}</div>
          <button onClick={()=>setGlobalErr('')} style={{ background:'none', border:'none', cursor:'pointer', color:'#92400E', fontSize:16, lineHeight:1, flexShrink:0 }}>×</button>
        </div>
      )}

      {/* Newly selected files + AI results */}
      {files.map((fo,i) => {
        const r = results[fo.id];
        const [col, bg, border] = r?.state && stateStyle[r.state] ? stateStyle[r.state] : ['#6B7280','#F9FAFB','#E5E7EB'];

        return (
          <div key={fo.id||i} style={{marginTop:8,border:`1.5px solid ${r ? border : '#E5E7EB'}`,borderRadius:12,overflow:'hidden',transition:'border-color .3s'}}>

            {/* File header row */}
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',background:'#fff'}}>
              <span style={{fontSize:16}}>{fo.name?.endsWith('.pdf')?'📄':'🖼️'}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fo.name}</div>
                <div style={{fontSize:10,color:'var(--gray-400)'}}>{fo.size?(fo.size/1024).toFixed(0)+' KB':''}</div>
              </div>
              {r?.state==='loading' && (
                <span style={{fontSize:11,color:'#6B4EE6',display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                  <span className="spinner" style={{width:11,height:11,borderWidth:2,borderColor:'#6B4EE6',borderTopColor:'transparent'}}/>
                  Claude reading…
                </span>
              )}
              {r?.state && r.state!=='loading' && r.state!=='err' && (
                <span style={{fontSize:11,fontWeight:700,color:col,flexShrink:0,padding:'2px 8px',background:bg,borderRadius:10,border:`1px solid ${border}`}}>
                  {r.state==='ok'?'✓ Validated':r.state==='warn'?'⚠ Needs Review':r.state==='fail'?'✗ Issues Found':''}
                </span>
              )}
              <button onClick={e=>{e.stopPropagation();remove(i);}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--gray-400)',padding:2,flexShrink:0,lineHeight:1}}>✕</button>
            </div>

            {/* AI Analysis card */}
            {r?.data && <AIResultCard result={r.data} state={r.state}/>}

            {/* Error state */}
            {r?.state==='err' && (
              <div style={{padding:'8px 12px',background:'#FEF3C7',borderTop:'1px solid #FCD34D',fontSize:11,color:'#92400E'}}>
                {r.authFail
                  ? '⚠ API key not configured — document saved, manual review will proceed'
                  : `⚠ AI read failed (${r.error}) — document saved for manual review`}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ── Rich AI result card rendered below each file ─────────────────────────
const AIResultCard = ({ result, state }) => {
  const [open, setOpen] = useState(true);
  if (!result) return null;

  const bgMap   = { ok:'#F0FDF4', warn:'#FFFBEB', fail:'#FEF2F2', err:'#FEF3C7' };
  const colMap  = { ok:'#065F46', warn:'#92400E', fail:'#991B1B', err:'#92400E' };
  const iconMap = { ok:'✅', warn:'⚠️', fail:'❌', err:'⚠️' };

  // Pick the best extracted data block
  const extracted = result.extractedData || result.billData || result.clinicalData || {};
  const checks    = result.checks || [];
  const issues    = result.discrepancies || [];
  const actions   = result.recommendations || [];

  return (
    <div style={{background:bgMap[state]||'#F9FAFB',borderTop:'1px solid rgba(0,0,0,0.06)'}}>
      {/* Header + toggle */}
      <div onClick={()=>setOpen(!open)} style={{padding:'8px 12px',display:'flex',alignItems:'center',gap:8,cursor:'pointer',userSelect:'none'}}>
        <span style={{fontSize:14}}>{iconMap[state]||'🤖'}</span>
        <span style={{fontWeight:700,fontSize:12,color:'#1A1A2E',flex:1}}>
          Claude AI Analysis
          {result.documentType && <span style={{fontWeight:400,color:'var(--gray-500)',marginLeft:6}}>· {result.documentType}</span>}
        </span>
        {result.confidence && (
          <span style={{fontSize:10,color:colMap[state]||'#374151',fontWeight:600,background:'rgba(255,255,255,0.6)',padding:'2px 7px',borderRadius:10}}>
            {(result.confidence*100).toFixed(0)}% confidence
          </span>
        )}
        <span style={{fontSize:12,color:'var(--gray-400)'}}>{open?'▲':'▼'}</span>
      </div>

      {open && (
        <div style={{padding:'0 12px 12px'}}>
          {/* Summary */}
          {result.summary && (
            <div style={{fontSize:12,color:colMap[state]||'#374151',lineHeight:1.6,marginBottom:10,padding:'8px 10px',background:'rgba(255,255,255,0.5)',borderRadius:8}}>
              {result.summary}
            </div>
          )}

          {/* Extracted data */}
          {Object.keys(extracted).length>0 && (
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:.5,color:'var(--gray-500)',marginBottom:5}}>EXTRACTED FROM DOCUMENT</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px 16px'}}>
                {Object.entries(extracted).filter(([,v])=>v&&v!=='null'&&v!=='undefined').map(([k,v])=>(
                  <div key={k} style={{display:'flex',gap:4,fontSize:11}}>
                    <span style={{color:'var(--gray-400)',flexShrink:0,textTransform:'capitalize',minWidth:80}}>
                      {k.replace(/([A-Z])/g,' $1').trim()}:
                    </span>
                    <span style={{fontWeight:600,color:'#1A1A2E'}}>{String(v)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Checks */}
          {checks.length>0 && (
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:.5,color:'var(--gray-500)',marginBottom:5}}>VALIDATION CHECKS</div>
              {checks.map((ch,i)=>(
                <div key={i} style={{display:'flex',gap:6,marginBottom:3,fontSize:11,alignItems:'flex-start'}}>
                  <span style={{flexShrink:0,fontWeight:700,color:ch.passed?'#10B981':'#DC2626'}}>{ch.passed?'✓':'✗'}</span>
                  <span style={{fontWeight:600,color:'#374151',flexShrink:0}}>{ch.name}</span>
                  {(ch.detail||ch.message) && <span style={{color:'var(--gray-500)'}}> — {ch.detail||ch.message}</span>}
                </div>
              ))}
            </div>
          )}

          {/* Issues */}
          {issues.length>0 && (
            <div style={{padding:'6px 10px',background:'rgba(239,68,68,0.08)',borderRadius:8,marginBottom:6,borderLeft:'3px solid #EF4444'}}>
              <div style={{fontWeight:700,fontSize:10,color:'#DC2626',marginBottom:4,letterSpacing:.3}}>⚠ ISSUES FOUND</div>
              {issues.map((d,i)=><div key={i} style={{fontSize:11,color:'#B91C1C',marginBottom:2}}>• {d}</div>)}
            </div>
          )}

          {/* Action items */}
          {actions.length>0 && (
            <div style={{padding:'6px 10px',background:'rgba(59,130,246,0.06)',borderRadius:8,borderLeft:'3px solid #3B82F6'}}>
              <div style={{fontWeight:700,fontSize:10,color:'#1D4ED8',marginBottom:4,letterSpacing:.3}}>📋 ACTION ITEMS FOR STAFF</div>
              {actions.map((r,i)=><div key={i} style={{fontSize:11,color:'#1E40AF',marginBottom:2}}>• {r}</div>)}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ==================== HISTORICAL DATA COMPARISON ====================
const HistoricalDataComparison = ({ currentData, historicalData }) => {
  if (!historicalData || historicalData.length === 0) {
    return (
      <div className="historical-data-panel">
        <div className="panel-title">
          <Icon name="history" size={16}/>
          Historical Data Comparison
        </div>
        <div style={{ fontSize: 13, color: 'var(--gray-600)' }}>No historical data available for comparison</div>
      </div>
    );
  }

  const avgAmount = historicalData.reduce((sum, h) => sum + (h.amount || 0), 0) / historicalData.length;
  const avgDays = historicalData.reduce((sum, h) => sum + (h.days || 0), 0) / historicalData.length;

  return (
    <div className="historical-data-panel">
      <div className="panel-title">
        <Icon name="history" size={16}/>
        Historical Data Comparison ({historicalData.length} similar cases)
      </div>
      
      <div className="comparison-row">
        <span className="label">Average Bill Amount</span>
        <span className={`value ${Math.abs((currentData.amount || 0) - avgAmount) / avgAmount < 0.2 ? 'match' : 'mismatch'}`}>
          {formatCurrency(avgAmount)}
        </span>
      </div>
      
      <div className="comparison-row">
        <span className="label">Average Processing Days</span>
        <span className="value">{avgDays.toFixed(1)} days</span>
      </div>
      
      <div className="comparison-row">
        <span className="label">Current Case Amount</span>
        <span className="value">{formatCurrency(currentData.amount)}</span>
      </div>
    </div>
  );
};

// ==================== DOCUMENT DELETION COUNTDOWN ====================
const DocumentDeletionCountdown = ({ settlementDate }) => {
  const [daysRemaining, setDaysRemaining] = useState(0);

  useEffect(() => {
    if (settlementDate) {
      const deletionDate = new Date(new Date(settlementDate).getTime() + 40 * 24 * 60 * 60 * 1000);
      const remaining = Math.ceil((deletionDate - new Date()) / (24 * 60 * 60 * 1000));
      setDaysRemaining(remaining);
    }
  }, [settlementDate]);

  if (!settlementDate || daysRemaining <= 0) return null;

  return (
    <div className="countdown-timer">
      <Icon name="clock" size={12}/>
      Documents auto-delete in {daysRemaining} days
    </div>
  );
};

  const [formData, setFormData] = useState({
    patientName: existingCustomer?.patientName || '',
    mobile: existingCustomer?.mobile || '',
    altMobile: existingCustomer?.altMobile || '',
    address: existingCustomer?.address || '',
    pan: existingCustomer?.pan || '',
    reason: existingCustomer?.reason || '',
    insuranceCompany: existingCustomer?.insuranceCompany || '',
    tpaName: existingCustomer?.tpaName || '',
    policyNumber: existingCustomer?.policyNumber || ''
  });
  
  const [selectedPackage, setSelectedPackage] = useState('');
  const [mandatoryDocs, setMandatoryDocs] = useState({
    panCopy: [],
    aadhar: [],
    healthCard: [],
    consultationPaper: [],
    idProof: [],
    photo: []
  });
  
  const [optionalDocs, setOptionalDocs] = useState({
    panCopy: [],
    aadhar: [],
    healthCard: [],
    idProof: [],
    photo: []
  });

  const [aiValidations, setAiValidations] = useState({});
  const [isSubmitted, setIsSubmitted] = useState(false);
  const [showExport, setShowExport] = useState(false);
  const [exportData, setExportData] = useState(null);
  
  const handleInputChange = (field, value) => {
    setFormData({ ...formData, [field]: value });
  };

  const handleAIValidation = (fileId, validation) => {
    setAiValidations(prev => ({ ...prev, [fileId]: validation }));
  };

  const handleSubmit = () => {
    // Validate mandatory fields
    if (!formData.patientName || !formData.mobile || !formData.address || !formData.pan || !formData.reason) {
      alert('Please fill all required fields');
      return;
    }
    
    // Validate mandatory documents
    const mandatoryFields = ['panCopy', 'aadhar', 'healthCard', 'consultationPaper', 'idProof', 'photo'];
    for (const field of mandatoryFields) {
      if (mandatoryDocs[field].length === 0) {
        alert(`Please upload ${field.replace(/([A-Z])/g, ' $1').trim()}`);
        return;
      }
    }

    // Check for AI validation errors
    const hasErrors = Object.values(aiValidations).some(v => !v.isValid);
    if (hasErrors) {
      const proceed = window.confirm('Some documents have validation issues. Do you want to proceed anyway?');
      if (!proceed) return;
    }
    
    // Prepare documents data with file names and AI validation
    const mandatoryDocsData = {};
    Object.keys(mandatoryDocs).forEach(key => {
      mandatoryDocsData[key] = mandatoryDocs[key].map(f => ({
        name: f.name,
        id: f.id,
        validated: aiValidations[f.id]?.isValid || false
      }));

    const optionalDocsData = {};

      mandatoryDocs: mandatoryDocsData,

      'Discrepancies': exportData.aiValidationSummary.discrepancies.join('; ') || 'None'
    }];
    exportCSV(rows, `Customer_Documents_${(formData.patientName||'unknown').replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.xlsx`);
  };

                <div style={{ textAlign: 'center', padding: 12, background: '#fff', borderRadius: 8 }}>

                </div>
              </div>
              <Button variant="secondary" icon="download" onClick={exportToExcel} fullWidth>
                Download Excel Report

          <Button onClick={onBack}>Back to Login</Button>

const NewCaseForm = ({ branchId, onBack, onSave, existingCases }) => {
  const [phoneSearch, setPhoneSearch] = useState('');
  const [customerFound, setCustomerFound] = useState(null);
  const [showInsuranceFields, setShowInsuranceFields] = useState(true); // Always show form — phone search is optional
  const [selectedPackage, setSelectedPackage] = useState('');
  const [fbDocuments, setFbDocuments] = useState([]);
  const [dsDocuments, setDsDocuments] = useState([]);
  const [fbValidation, setFbValidation] = useState(null);
  const [dsValidation, setDsValidation] = useState(null);
  const [preAuthDocs, setPreAuthDocs] = useState({ healthCard: [], prescription: [], medicalRecords: [], labReports: [] });
  const [validationRemarks, setValidationRemarks] = useState([]);
  
  const branch = BRANCHES.find(b => b.id === branchId);
  
  const [formData, setFormData] = useState({
    patientName: '',
    ipNumber: '',
    mobile: '',
    altMobile: '',
    email: '',
    address: '',
    pan: '',
    dob: '',
    admissionDate: '',
    dischargeDate: '',
    reason: '',
    doctorName: '',
    department: '',
    roomNumber: '',
    billNumber: '',
    grossAmount: '',
    discount: '',
    advancePaid: '',
    insuranceCompany: '',
    tpaName: '',
    policyNumber: '',
    policyType: '',
    sumInsured: ''
  });
  
  const handlePhoneSearch = () => {
    const customer = CUSTOMER_DATA_STORE.find(c => c.mobile === phoneSearch);
    const existingCase = existingCases.find(c => c.mobile === phoneSearch);
    
    if (customer) {
      setCustomerFound(customer);
      setFormData({
        ...formData,
        patientName: customer.patientName || '',
        mobile: customer.mobile || '',
        altMobile: customer.altMobile || '',
        address: customer.address || '',
        pan: customer.pan || '',
        reason: customer.reason || '',
        insuranceCompany: customer.insuranceCompany || '',
        policyNumber: customer.policyNumber || ''
      });
      if (customer.packageType) {
        setSelectedPackage(customer.packageType);
      }
    } else if (existingCase) {
      setCustomerFound(existingCase);
      setFormData({
        ...formData,
        patientName: existingCase.patientName || '',
        mobile: existingCase.mobile || '',
        altMobile: existingCase.altMobile || '',
        email: existingCase.email || '',
        address: existingCase.address || '',
        pan: existingCase.pan || '',
        dob: existingCase.dob || '',
        reason: existingCase.reason || ''
      });
    } else {
      setCustomerFound(null);
      setFormData({ ...formData, mobile: phoneSearch });
    }
    setShowInsuranceFields(true);
  };
  
  const handleInputChange = (field, value) => {
    setFormData({ ...formData, [field]: value });
  };

  const validateFBDS = () => {
    if (!selectedPackage) return;

    const fbData = {
      amount: parseFloat(formData.grossAmount || 0),
      billDate: formData.dischargeDate,
      patientName: formData.patientName
    };

    const dsData = {
      dischargeDate: formData.dischargeDate,
      patientName: formData.patientName
    };

    const validation = AIValidationEngine.validateFBDS(fbData, dsData, selectedPackage);
    
    // Add validation remarks
    const newRemark = {
      id: `remark-${Date.now()}`,
      validatorName: 'System (AI)',
      remark: `FB/DS Validation: ${validation.isValid ? 'Passed' : 'Failed'} - ${validation.discrepancies.join(', ') || 'No discrepancies'}`,
      stage: 'finalBill',
      timestamp: new Date().toISOString(),
      type: 'system'
    };
    
    setValidationRemarks([...validationRemarks, newRemark]);
    setFbValidation(validation);
  };

  const handleSave = () => {
    if (!formData.patientName || !formData.mobile || !formData.admissionDate) {
      alert('Please fill all required fields: Patient Name, Mobile, IP Number, Admission Date');
      return;
    }

    const netAmount = parseFloat(formData.grossAmount || 0) - parseFloat(formData.discount || 0);
    const insurancePayable = Math.floor(netAmount * 0.8);

    // Detect anomalies
    const anomalies = AIValidationEngine.detectAnomalies(
      { ...formData, netAmount, branchCode: branchId },
      existingCases
    );
    
    const newCase = {
      id: `CNH-2024-${(existingCases.length + 1).toString().padStart(3, '0')}`,
      uhid: `CNH-${branch.code}-${Math.floor(100000 + Math.random() * 900000)}`,
      ...formData,
      netAmount,
      patientPayable: 0,
      insurancePayable,
      location: branch.name,
      branchCode: branchId,
      fy: '2024-25',
      packageType: 'Default',
      currentStage: 1,
      workflowStatus: 'preAuth',
      stages: {
        preAuth: { 
          status: (fbDocuments.length + dsDocuments.length + preAuthDocs.healthCard.length + preAuthDocs.prescription.length + preAuthDocs.medicalRecords.length + preAuthDocs.labReports.length) > 0 ? 'review' : 'pending', 
          docs: [
            ...fbDocuments.map(f => f.name || f),
            ...dsDocuments.map(f => f.name || f),
            ...preAuthDocs.healthCard.map(f => f.name || f),
            ...preAuthDocs.prescription.map(f => f.name || f),
            ...preAuthDocs.medicalRecords.map(f => f.name || f),
            ...preAuthDocs.labReports.map(f => f.name || f),
          ], 
          uploadedAt: new Date().toISOString(), reviewedAt: null, reviewedBy: null, comments: null, validationRemarks: [] 
        },
        finalBill: { status: 'pending', docs: [], uploadedAt: null, reviewedAt: null, reviewedBy: null, comments: null, validationRemarks: [] },
        approval: { status: 'pending', docs: [], uploadedAt: null, reviewedAt: null, reviewedBy: null, comments: null, validationRemarks: [] },
        documentation: { status: 'pending', docs: [], uploadedAt: null, reviewedAt: null, reviewedBy: null, comments: null, validationRemarks: [] }
      },
      queries: [],
      podDetails: null,
      settledAmount: null,
      utrNumber: null,
      neftDate: null,
      settlementStatus: 'Pending',
      fbDocuments: fbDocuments.map(f => f.name || f),
      dsDocuments: dsDocuments.map(f => f.name || f),
      preAuthDocs: {
        healthCard: preAuthDocs.healthCard.map(f => f.name || f),
        prescription: preAuthDocs.prescription.map(f => f.name || f),
        medicalRecords: preAuthDocs.medicalRecords.map(f => f.name || f),
        labReports: preAuthDocs.labReports.map(f => f.name || f),
      },
      aiValidationSummary: null,
      anomalies,
      validationRemarks,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    
    onSave(newCase);
  };
  
  return (

        <Button variant="secondary" size="sm" onClick={onBack} icon="arrow_left">Back</Button>
        <h2 style={{ fontSize: 24, fontWeight: 700 }}>Create New Case</h2>
      </div>
      
      {/* Phone Search — Optional Auto-Fill */}
      <Card style={{ marginBottom: 24, borderLeft: '4px solid var(--primary)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
          <Icon name="search" size={18} color="var(--primary)"/>
          <h3 style={{ fontSize: 16, fontWeight: 700 }}>Auto-Fill from Existing Record</h3>
          <span style={{ fontSize: 12, color: 'var(--gray-400)', marginLeft: 4 }}>(Optional — you can also fill the form below directly)</span>
        </div>
        <div style={{ display: 'flex', gap: 12 }}>

// ==================== USER MANAGEMENT COMPONENT ====================
const UserManagement = ({ currentUser }) => {
  const [activeTab, setActiveTab] = useState('branches');
  const [showAddUser, setShowAddUser] = useState(false);
  const [newUser, setNewUser] = useState({ username: '', password: '', role: 'branch', branchId: '', corporateRole: '' });
  const [toast, setToast] = useState(null);

  const handleAddUser = () => {
    if (!newUser.username || !newUser.password) {
      setToast({ message: 'Please fill all required fields', type: 'error' });
      return;
    }

    if (newUser.role === 'branch' && !newUser.branchId) {
      setToast({ message: 'Please select a branch', type: 'error' });
      return;
    }

    if (newUser.role === 'corporate' && !newUser.corporateRole) {
      setToast({ message: 'Please select a corporate role', type: 'error' });
      return;
    }

    const userId = `user_${Date.now()}`;
    if (newUser.role === 'branch') {
      const branch = BRANCHES.find(b => b.id === newUser.branchId);
      USER_ACCOUNTS.branches.push({
        id: userId,
        username: newUser.username,
        password: newUser.password,
        role: 'branch',
        branchId: newUser.branchId,
        branchName: branch?.name,
        name: newUser.username,
        createdAt: new Date().toISOString(),
        createdBy: currentUser?.id
      });
    } else {
      USER_ACCOUNTS.corporate.push({
        id: userId,
        username: newUser.username,
        password: newUser.password,
        role: 'corporate',
        corporateRole: newUser.corporateRole,
        name: newUser.username,
        createdAt: new Date().toISOString(),
        createdBy: currentUser?.id
      });
    }

    logActivity(currentUser?.id, 'CREATE_USER', { userId, role: newUser.role });
    setToast({ message: 'User created successfully', type: 'success' });
    setShowAddUser(false);
    setNewUser({ username: '', password: '', role: 'branch', branchId: '', corporateRole: '' });
  };

  const handleDeleteUser = (userId, role) => {
    if (!window.confirm('Are you sure you want to delete this user?')) return;

    if (role === 'branch') {
      const index = USER_ACCOUNTS.branches.findIndex(u => u.id === userId);
      if (index > -1) USER_ACCOUNTS.branches.splice(index, 1);
    } else {
      const index = USER_ACCOUNTS.corporate.findIndex(u => u.id === userId);
      if (index > -1) USER_ACCOUNTS.corporate.splice(index, 1);
    }

    logActivity(currentUser?.id, 'DELETE_USER', { userId });
    setToast({ message: 'User deleted successfully', type: 'success' });
  };

  return (
    <div className="fade-in">
      <h2 style={{ fontSize: 32, fontWeight: 700, marginBottom: 24 }}>User Management</h2>
      
      <div className="tab-nav">
        <button className={activeTab === 'branches' ? 'active' : ''} onClick={() => setActiveTab('branches')}>Branch Users</button>
        <button className={activeTab === 'corporate' ? 'active' : ''} onClick={() => setActiveTab('corporate')}>Corporate Users</button>
        <button className={activeTab === 'activity' ? 'active' : ''} onClick={() => setActiveTab('activity')}>Activity Log</button>
      </div>

      {activeTab === 'branches' && (
        <Card>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
            <h3 style={{ fontSize: 18, fontWeight: 700 }}>Branch Users</h3>
            <Button size="sm" icon="plus" onClick={() => { setNewUser({ ...newUser, role: 'branch' }); setShowAddUser(true); }}>Add Branch User</Button>
          </div>
          <table className="user-table">
            <thead>
              <tr>
                <th>Username</th>
                <th>Branch</th>
                <th>Created At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {USER_ACCOUNTS.branches.map(user => (
                <tr key={user.id}>
                  <td>{user.username}</td>
                  <td>{user.branchName}</td>
                  <td>{formatDate(user.createdAt)}</td>
                  <td>
                    <button className="action-btn delete" onClick={() => handleDeleteUser(user.id, 'branch')}>Delete</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {activeTab === 'corporate' && (
        <Card>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
            <h3 style={{ fontSize: 18, fontWeight: 700 }}>Corporate Users</h3>
            <Button size="sm" icon="plus" onClick={() => { setNewUser({ ...newUser, role: 'corporate' }); setShowAddUser(true); }}>Add Corporate User</Button>
          </div>
          <table className="user-table">
            <thead>
              <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Created At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {USER_ACCOUNTS.corporate.map(user => (
                <tr key={user.id}>
                  <td>{user.username}</td>
                  <td><span className={`role-badge ${user.corporateRole?.toLowerCase().split('_')[0]}`}>{CORPORATE_ROLES[user.corporateRole]?.name}</span></td>
                  <td>{formatDate(user.createdAt)}</td>
                  <td>
                    <button className="action-btn delete" onClick={() => handleDeleteUser(user.id, 'corporate')}>Delete</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {activeTab === 'activity' && (
        <Card>
          <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>Activity Log</h3>
          <table className="user-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>User</th>
                <th>Action</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody>
              {USER_ACTIVITY_LOG.slice().reverse().map((log, i) => (
                <tr key={i}>
                  <td>{new Date(log.timestamp).toLocaleString()}</td>
                  <td>{log.userId}</td>
                  <td>{log.action}</td>
                  <td style={{ fontSize: 12 }}>{JSON.stringify(log.details)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {showAddUser && (
        <div className="modal-overlay" onClick={() => setShowAddUser(false)}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <h3 style={{ fontSize: 20, fontWeight: 700, marginBottom: 24 }}>Add New User</h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <Input 
                label="Username" 
                value={newUser.username} 
                onChange={(e) => setNewUser({...newUser, username: e.target.value})}
                placeholder="Enter username"
              />
              <Input 
                label="Password" 
                type="password"
                value={newUser.password} 
                onChange={(e) => setNewUser({...newUser, password: e.target.value})}
                placeholder="Enter password"
              />
              {newUser.role === 'branch' && (
                <div>
                  <label style={{ fontSize: 13, fontWeight: 600, marginBottom: 6, display: 'block' }}>Select Branch</label>
                  <select 
                    value={newUser.branchId} 
                    onChange={(e) => setNewUser({...newUser, branchId: e.target.value})}
                    style={{ width: '100%', padding: '12px', borderRadius: 12, border: '2px solid var(--gray-200)' }}
                  >
                    <option value="">Select Branch</option>
                    {BRANCHES.map(b => (
                      <option key={b.id} value={b.id}>{b.name}</option>
                    ))}
                  </select>
                </div>
              )}
              {newUser.role === 'corporate' && (
                <div>
                  <label style={{ fontSize: 13, fontWeight: 600, marginBottom: 6, display: 'block' }}>Select Role</label>
                  <select 
                    value={newUser.corporateRole} 
                    onChange={(e) => setNewUser({...newUser, corporateRole: e.target.value})}
                    style={{ width: '100%', padding: '12px', borderRadius: 12, border: '2px solid var(--gray-200)' }}
                  >
                    <option value="">Select Role</option>
                    {Object.entries(CORPORATE_ROLES).map(([key, role]) => (
                      <option key={key} value={key}>{role.name}</option>
                    ))}
                  </select>
                </div>
              )}
            </div>
            <div style={{ display: 'flex', gap: 12, marginTop: 24 }}>
              <Button variant="secondary" fullWidth onClick={() => setShowAddUser(false)}>Cancel</Button>
              <Button fullWidth onClick={handleAddUser}>Create User</Button>
            </div>
          </div>
        </div>
      )}

      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
};

// ==================== ENHANCED RECONCILIATION VIEW ====================
const ReconciliationView = ({ cases, onUpdateCases, userRole, corporateRole }) => {
  const [viewMode, setViewMode] = useState('dashboard');
  const [editingCase, setEditingCase] = useState(null);
  const [filter, setFilter] = useState('all');
  const [searchTerm, setSearchTerm] = useState('');
  const [validationRemark, setValidationRemark] = useState('');
  const [filterIns, setFilterIns] = useState('all');
  const [filterBranch, setFilterBranch] = useState('all');
  const [filterTPA, setFilterTPA] = useState('all');
  // SVG charts used instead of Chart.js canvas

  // Check permissions
  const canEditSettlement = corporateRole === 'SETTLEMENT_TEAM' || corporateRole === 'ADMIN';
  const canViewReconciliation = corporateRole === 'SETTLEMENT_TEAM' || corporateRole === 'ADMIN';

  if (!canViewReconciliation) {
    return (
      <div className="fade-in">
        <Card style={{ textAlign: 'center', padding: 48 }}>
          <Icon name="lock" size={48} color="var(--gray-400)" style={{ marginBottom: 16 }}/>
          <h3 style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Access Denied</h3>
          <p style={{ color: 'var(--gray-500)' }}>You do not have permission to view reconciliation data.</p>
        </Card>
      </div>
    );
  }

  const reconciledCases = cases.filter(c => c.stages.documentation.status === 'completed' || c.workflowStatus === 'documentation');
  
  const filteredCases = reconciledCases.filter(c => {
    if (filter !== 'all' && c.settlementStatus !== filter) return false;
    if (filterIns !== 'all' && c.insuranceCompany !== filterIns) return false;
    if (filterBranch !== 'all' && c.branchCode !== filterBranch) return false;
    if (filterTPA !== 'all' && c.tpaName !== filterTPA) return false;
    if (searchTerm && !c.patientName.toLowerCase().includes(searchTerm.toLowerCase()) && !c.id.toLowerCase().includes(searchTerm.toLowerCase()) && !(c.utrNumber||'').toLowerCase().includes(searchTerm.toLowerCase())) return false;
    return true;
  });

  const stats = {
    total: reconciledCases.length,
    totalOutstanding: reconciledCases.reduce((sum, c) => sum + (c.insurancePayable || 0), 0),
    settled: reconciledCases.filter(c => c.settlementStatus === 'Settled').length,
    shortPaid: reconciledCases.filter(c => c.settlementStatus === 'Short Paid').length,
    dispatched: reconciledCases.filter(c => c.settlementStatus === 'Dispatched').length,
    pending: reconciledCases.filter(c => c.settlementStatus === 'Pending').length
  };

  const agingData = { '0-15 Days': { count: 0, amount: 0 }, '16-30 Days': { count: 0, amount: 0 }, '31-45 Days': { count: 0, amount: 0 }, '46-60 Days': { count: 0, amount: 0 }, '60+ Days': { count: 0, amount: 0 } };
  reconciledCases.forEach(c => {
    if (c.settlementStatus !== 'Settled') {
      const aging = calculateAging(c.dischargeDate);
      const bucket = getAgingBucket(aging);
      agingData[bucket].count++;
      agingData[bucket].amount += c.insurancePayable || 0;
    }
  });

  const insuranceData = {};
  reconciledCases.forEach(c => {
    if (!insuranceData[c.insuranceCompany]) insuranceData[c.insuranceCompany] = { count: 0, outstanding: 0, settled: 0 };
    insuranceData[c.insuranceCompany].count++;
    if (c.settlementStatus === 'Settled') insuranceData[c.insuranceCompany].settled += c.settledAmount || 0;
    else insuranceData[c.insuranceCompany].outstanding += c.insurancePayable || 0;
  });

  // charts rendered as SVG - no canvas needed

  const handleEditCase = (caseData) => {
    if (!canEditSettlement) {
      alert('You do not have permission to edit settlement data');
      return;
    }
    setEditingCase({ ...caseData });
  };

  const handleSaveEdit = () => {
    if (!canEditSettlement) return;

    if (editingCase.settledAmount && editingCase.utrNumber) {
      const insurancePayable = editingCase.insurancePayable || 0;
      const settledAmount = parseFloat(editingCase.settledAmount);
      
      // Add validation remark
      const remark = {
        id: `remark-${Date.now()}`,
        validatorName: editingCase.validatorName || 'Settlement Officer',
        remark: validationRemark || `Settlement updated: ${formatCurrency(settledAmount)} against ${formatCurrency(insurancePayable)}`,
        stage: 'settlement',
        timestamp: new Date().toISOString()
      };

      if (settledAmount < insurancePayable) {
        editingCase.settlementStatus = 'Short Paid';
      } else if (settledAmount === insurancePayable) {
        editingCase.settlementStatus = 'Settled';
      }
      
      editingCase.neftDate = editingCase.neftDate || new Date().toISOString().split('T')[0];
      editingCase.settledDate = new Date().toISOString();
      editingCase.validationRemarks = [...(editingCase.validationRemarks || []), remark];
    }
    
    onUpdateCases(cases.map(c => c.id === editingCase.id ? editingCase : c));
    setEditingCase(null);
    setValidationRemark('');
  };

  const exportToExcel = () => {
    // Export in exact Settlement Tracker format matching uploaded template
    const fmt = (d) => { if (!d) return ''; try { return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch(e){ return d; } };
    const data = filteredCases.map((c, i) => ({
      'S No':                            i + 1,
      'Location':                        c.location || '',
      'Patient Name':                    c.patientName || '',
      'MPI NO as Lifetrenz':             c.uhid || '',
      'MPI No':                          c.uhid?.replace(/^CNH-[A-Z0-9]+-/,'') || '',
      'IP ID':                           c.id || '',
      'Admit Group':                     c.reason || '',
      'Admission Purpose':               c.reason || '',
      'DOA':                             fmt(c.admissionDate),
      'DOD':                             fmt(c.dischargeDate),
      'Bill No':                         c.billNumber || '',
      'TPA Name':                        c.tpaName || '',
      'Insurance Company':               c.insuranceCompany || '',
      'TP ID NO':                        c.policyNumber || '',
      'Pre-AutNo':                       c.stages?.preAuth?.docs?.[0] || '',
      'Final Bill Amount':               c.grossAmount || '',
      'Insurance payable':               c.insurancePayable || '',
      'Disocunt Remarks':                c.discount ? 'Discount Applied' : '',
      'MOU Discount Applied in Bill':    c.discount || '',
      'Date of Submission':              fmt(c.stages?.documentation?.uploadedAt),
      'Courier provider':                c.podDetails?.courierName || '',
      'Courier Doc ID':                  c.podDetails?.trackingNumber || '',
      'Status':                          c.settlementStatus || 'Pending',
      'Payment received':                c.settledAmount || '',
      'TDS':                             c.settledAmount && c.insurancePayable ? Math.round((c.insurancePayable - c.settledAmount) * 0.1) || '' : '',
      'Hospital Agreed Discount':        c.discount || '',
      'Debit to CT/Moved to CT':         '',
      'NEFT Number':                     c.utrNumber || '',
      'NEFT Date':                       fmt(c.neftDate),
      'PAYMENT UPDATE DATE':             fmt(c.settledDate),
      'NET OS':                          c.settlementStatus === 'Settled' ? 0 : (c.insurancePayable || 0) - (c.settledAmount || 0),
      'Aging Days':                      calculateAging(c.dischargeDate),
      'Discount as settled':             '',
      'Excess Amt Received':             c.settledAmount > c.insurancePayable ? c.settledAmount - c.insurancePayable : '',
      'Reason for Short payment as given by the TPA': c.settlementStatus === 'Short Paid' ? 'Short Payment by TPA' : '',
      'Remarks':                         (c.queries||[]).map(q=>q.query).join('; ') || 'Claim Is Under Process',
      ' Receivable / Non Receivable ':   'Receivable from TPA/Insurance',
      'Corporate Name':                  '',
      'EMPLOYEE CODE':                   '',
      'INSURANCE REF NO':                c.policyNumber || '',
      'Year':                            c.fy || 'FYR 25-26',
      'C9/CT':                           c.location || '',
    }));
    exportCSV(data, `Settlement_Tracker_${new Date().toISOString().split('T')[0]}.xlsx`);
  };

  const renderDashboard = () => {
    const statusPie=[
      {name:'Pending',value:stats.pending,color:'#FFB800'},
      {name:'Dispatched',value:stats.dispatched,color:'#3498DB'},
      {name:'Settled',value:stats.settled,color:'#00D4AA'},
      {name:'Short Paid',value:stats.shortPaid,color:'#FF4757'},
    ].filter(d=>d.value>0);
    const branchData=BRANCHES.map(b=>({name:b.name.replace('Bangalore ',''),outstanding:Math.round(reconciledCases.filter(c=>c.branchCode===b.id&&c.settlementStatus!=='Settled').reduce((s,c)=>s+(c.insurancePayable||0),0)/1000)}));
    return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 24 }}>

  const renderBulkSettlementUpload = () => {
    const [bsStep, setBsStep] = React.useState('upload');
    const [bsResults, setBsResults] = React.useState([]);
    const [bsError, setBsError] = React.useState('');
    const [bsProcessing, setBsProcessing] = React.useState(false);
    const [bsUpdated, setBsUpdated] = React.useState(0);
    const bsRef = React.useRef();

    const parseBulkSettlement = (file) => {
      setBsError('');
      const reader = new FileReader();
      const handler = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: file.name.endsWith('.csv') ? 'string' : 'array' });
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
          if (!rows.length) { setBsError('File is empty.'); return; }
          const results = rows.map((row, i) => {
            const g = (...keys) => { for (const k of keys) { const v = row[k]; if (v !== undefined && String(v).trim() !== '') return String(v).trim(); } return ''; };
            const ipId = g('IP ID','Case ID','case_id','ip_id','id');
            const ipNum = g('IP Number','IP #','ip_number','ip');
            const status = g('Status','Settlement Status','settlement_status','status');
            const settled = g('Payment received','Settled Amount','settled_amount','payment_received');
            const utr = g('NEFT Number','UTR','UTR Number','utr','neft_number');
            const neftDate = g('NEFT Date','neft_date','Payment Date');
            const remarks = g('Remarks','remarks','notes');
            // Match case
            const matched = cases.find(c =>
              (ipId && (c.id === ipId || c.ipNumber === ipId)) ||
              (ipNum && c.ipNumber && String(c.ipNumber).trim() === ipNum.trim())
            );
            return {
              rowIdx: i, ipId, ipNum, status, settled, utr, neftDate, remarks,
              matched: !!matched, existingCase: matched || null,
              selected: !!matched && !!status,
            };
          });
          setBsResults(results);
          setBsStep('preview');
        } catch(err) { setBsError('Parse failed: ' + err.message); }
      };
      if (file.name.endsWith('.csv')) { reader.onload = handler; reader.readAsText(file); }
      else { reader.onload = handler; reader.readAsArrayBuffer(file); }
    };

    const handleBulkSettle = () => {
      setBsProcessing(true);
      const toUpdate = bsResults.filter(r => r.selected && r.matched);
      const now = new Date().toISOString();
      const updatedCases = cases.map(c => {
        const match = toUpdate.find(r => r.existingCase && r.existingCase.id === c.id);
        if (!match) return c;
        const settledAmt = parseFloat(match.settled) || c.settledAmount;
        const insPayable = c.insurancePayable || 0;
        let newStatus = match.status || c.settlementStatus;
        if (settledAmt && !match.status) {
          newStatus = settledAmt < insPayable ? 'Short Paid' : 'Settled';
        }
        const remark = {
          id: `remark-${Date.now()}-${Math.random()}`, validatorName: 'Settlement Officer (Bulk Upload)',
          remark: `Bulk settlement update: ${newStatus}${settledAmt ? ` | ₹${settledAmt.toLocaleString()}` : ''}${match.utr ? ` | UTR: ${match.utr}` : ''}`,
          stage: 'settlement', timestamp: now
        };
        return {
          ...c,
          settlementStatus: newStatus,
          settledAmount: settledAmt || c.settledAmount,
          utrNumber: match.utr || c.utrNumber,
          neftDate: match.neftDate || c.neftDate,
          settledDate: newStatus === 'Settled' || newStatus === 'Short Paid' ? now : c.settledDate,
          validationRemarks: [...(c.validationRemarks || []), remark],
        };
      });
      onUpdateCases(updatedCases);
      setBsUpdated(toUpdate.length);
      setBsStep('done');
      setBsProcessing(false);
    };

    const downloadBsTemplate = () => {
      const headers = ['IP ID','IP Number','Patient Name','Status','Payment received','NEFT Number','NEFT Date','Remarks'];
      const sample = ['CNH-2025-001','5069','Priya Sharma','Settled','52000','UTR2025XXXXXX','15-03-2026','Full payment received'];
      const ws = XLSX.utils.aoa_to_sheet([headers, sample]);
      ws['!cols'] = headers.map(h => ({ wch: Math.max(h.length + 4, 16) }));
      const wb2 = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb2, ws, 'Settlement Update');
      XLSX.writeFile(wb2, 'Settlement_Bulk_Update_Template.xlsx');
    };

    if (bsStep === 'done') return (
      <div className="fade-in" style={{ maxWidth: 560, margin: '48px auto' }}>
        <Card style={{ textAlign: 'center', padding: 48 }}>
          <div style={{ width: 72, height: 72, borderRadius: '50%', background: 'linear-gradient(135deg,#D1FAE5,#A7F3D0)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px' }}>
            <Icon name="check-circle" size={38} color="#059669"/>
          </div>
          <h2 style={{ fontSize: 24, fontWeight: 700, marginBottom: 6 }}>Settlement Updated!</h2>
          <div style={{ fontSize: 36, fontWeight: 700, color: 'var(--accent)', margin: '16px 0 4px' }}>{bsUpdated}</div>
          <div style={{ fontSize: 14, color: 'var(--gray-500)', marginBottom: 24 }}>Cases updated successfully</div>
          <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
            <Button variant="secondary" onClick={() => setViewMode('dashboard')}>Back to Dashboard</Button>
            <Button onClick={() => { setBsStep('upload'); setBsResults([]); setBsError(''); }}>Upload Another</Button>
          </div>
        </Card>
      </div>
    );

    if (bsStep === 'preview') {
      const matchedCount  = bsResults.filter(r => r.matched).length;
      const noMatchCount  = bsResults.filter(r => !r.matched).length;
      const selectedCount = bsResults.filter(r => r.selected).length;
      return (
        <div className="fade-in">
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
            <Button variant="secondary" size="sm" onClick={() => setBsStep('upload')} icon="arrow_left">Re-upload</Button>
            <div><h2 style={{ fontSize:22, fontWeight:700 }}>Review Settlement Update</h2>
              <div style={{ fontSize:12, color:'var(--gray-500)' }}>{bsResults.length} rows parsed</div></div>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:16 }}>
            {[
              { label:'TOTAL ROWS',    val: bsResults.length,  color:'#6B4EE6', sub:'In uploaded file' },
              { label:'CASES MATCHED', val: matchedCount,      color:'#10B981', sub:'Found in system' },
              { label:'NOT FOUND',     val: noMatchCount,      color:'#EF4444', sub:'IP ID/# not matched' },
              { label:'WILL UPDATE',   val: selectedCount,     color:'#1B4F8A', sub:'Selected below' },
            ].map(b => (
              <Card key={b.label} style={{ borderLeft:`4px solid ${b.color}`, padding:'14px 18px' }}>
                <div style={{ fontSize:10, fontWeight:700, color:'var(--gray-400)', letterSpacing:'0.05em', marginBottom:4 }}>{b.label}</div>
                <div style={{ fontSize:30, fontWeight:700, color:b.color, lineHeight:1 }}>{b.val}</div>
                <div style={{ fontSize:11, color:'var(--gray-400)', marginTop:4 }}>{b.sub}</div>
              </Card>
            ))}
          </div>
          {noMatchCount > 0 && <div style={{ padding:'10px 16px', background:'#FEF3C7', borderRadius:10, marginBottom:16, border:'1px solid #FDE68A', fontSize:13, color:'#92400E' }}>
            ⚠️ <b>{noMatchCount} row{noMatchCount !== 1 ? 's' : ''}</b> could not be matched to any case — these rows will be skipped.
          </div>}
          <Card style={{ padding:0, marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 16px', background:'var(--gray-50)', borderRadius:'12px 12px 0 0', borderBottom:'1px solid var(--gray-100)' }}>
              <span style={{ fontSize:13, fontWeight:600 }}>{selectedCount} of {matchedCount} matched rows selected</span>
              <div style={{ marginLeft:'auto', display:'flex', gap:8 }}>
                <button onClick={() => setBsResults(prev => prev.map(r => r.matched ? {...r, selected:true}  : r))} style={{ padding:'5px 12px', fontSize:11, fontWeight:600, background:'#D1FAE5', color:'#065F46', border:'1px solid #A7F3D0', borderRadius:7, cursor:'pointer' }}>Select All</button>
                <button onClick={() => setBsResults(prev => prev.map(r => ({...r, selected:false})))}           style={{ padding:'5px 12px', fontSize:11, fontWeight:600, background:'var(--gray-100)', color:'var(--gray-500)', border:'1px solid var(--gray-200)', borderRadius:7, cursor:'pointer' }}>Deselect All</button>

            <div style={{ overflowX:'auto' }}>
              <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
                <thead><tr style={{ background:'#1A1A2E', color:'#fff' }}>

                <tbody>
                  {bsResults.map((r, i) => {
                    const bg = !r.matched ? '#FEF2F2' : r.selected ? '#F0FDF4' : '#fff';
                    return (
                      <tr key={i} style={{ background:bg, borderBottom:'1px solid #f0f0f0' }}>
                        <td style={{ padding:'8px 12px', textAlign:'center', width:36 }}>
                          {r.matched
                            ? <input type="checkbox" checked={r.selected} onChange={() => setBsResults(prev => prev.map((x,j) => j===i ? {...x,selected:!x.selected} : x))}
                                style={{ width:15, height:15, cursor:'pointer', accentColor:'#10B981' }}/>
                            : <span style={{ fontSize:14 }}>❌</span>

                        </td>
                        <td style={{ padding:'8px 11px', fontFamily:'monospace', fontWeight:700, color:'var(--primary)', fontSize:11 }}>{r.existingCase?.id || r.ipId || '—'}</td>

                        <td style={{ padding:'8px 11px' }}>
