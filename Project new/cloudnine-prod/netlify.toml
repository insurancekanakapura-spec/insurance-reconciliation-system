# Cloudnine Insurance Platform - Netlify Deployment Configuration

[build]
  base = "client"
  publish = "dist"
  command = "npm run build"

[build.environment]
  VITE_API_URL = "https://your-server-url.com/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
